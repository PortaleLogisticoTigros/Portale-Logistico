<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piattaforma Tigros - Home</title>
    <link rel="icon" type="image/png" href="images.png">
    <link rel="apple-touch-icon" href="images.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');


        body {
            margin: 0;
            background: linear-gradient(135deg, #2b75ee 0%, #a0861d 100%) !important;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            height: auto; 
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            color: white;
        }

        nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-left { flex: 0 0 auto; display: flex; justify-content: flex-start; }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.15);
            padding: 5px 12px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        .user-initials {
            width: 30px;
            height: 30px;
            background: #ffcc00;
            color: #003087;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.85rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .user-fullname {
            color: white;
            font-size: 0.85rem;
            text-transform: capitalize;
        }

        nav ul { 
            list-style: none; 
            display: flex; 
            gap: 20px; 
            margin: 0; 
            padding: 0; 
            flex: 1; 
            justify-content: center; 
            text-align: center;
        }

        nav ul li a { 
            text-decoration: none; 
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            font-size: 1.15rem; 
            transition: all 0.4s ease; 
            cursor: pointer;
            white-space: nowrap;
        }

        nav ul:hover li a { filter: blur(2px); opacity: 0.5; transform: scale(0.95); }
        nav ul li a:hover { filter: blur(0px); opacity: 1; transform: scale(1.15); color: #ffcc00; }
        nav ul li a.logout { color: #efba0a !important; }

        .nav-right { flex: 0 0 auto; display: flex; justify-content: flex-end; }
        .nav-logo img { height: 38px; width: auto; transition: 0.3s; cursor: pointer; }

        /* --- BENVENUTO --- */
        .welcome-section {
            display: none; 
            padding: 40px 0;
            text-align: center;
            color: rgb(232, 155, 12);
        }
        .mostra-benvenuto { display: flex !important; justify-content: center; width: 100%; }
        .welcome-title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(24px, 5vw, 50px);
            text-shadow: 0 10px 30px rgba(0,0,0,0.4);
            animation: welcomeSequence 3s ease-in-out forwards;
        }

        .container-glass {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: flex-start;
            gap: 40px;
            padding: 40px 20px;
            z-index: 50;
        }

        /* Scrollbar personalizzata Gialla */
        body::-webkit-scrollbar { width: 10px; }
        body::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        body::-webkit-scrollbar-thumb { background: #ffcc00; border-radius: 10px; border: 2px solid #003087; }

        /* --- GLASS BOX STYLE --- */
        .glass-box-container {
            perspective: 1000px;
            display: none; 
        }

        .book-glass-box, .report-glass-box, .accessi-glass-box, .frutta-glass-box, 
        .manutenzione-glass-box, .haccp-glass-box, .trasporti-glass-box, 
        .freschi-glass-box, .impost-glass-box {
            background: rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(15px);
            padding: 20px; 
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            text-align: center; 
            width: 400px; 
            height: 250px;
            max-width: 90vw; 
            cursor: pointer; 
            transition: all 0.4s ease;
            box-sizing: border-box;
            animation: apparizioneIniziale 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .glass-box-container:hover {
            box-shadow: #ffcc00 0px 0px 20px;
            border-radius: 20px;
            transform: translateY(-5px);
        }

        /* --- TITOLI E ICONE INTERNE --- */
        .book-title, .report-title, .accessi-title, .frutta-title, 
        .manutenzione-title, .haccp-title, .trasporti-title, 
        .freschi-title, .impost-title {
            color: #ecb40c;
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: bold;
            transition: transform 0.4s ease;
        }

        .report_before, .frutta_before, .accessi_before, .manutenzione_before, 
        .haccp_before, .trasporti_before, .freschi_before, .impost_before {
            width: 130px; height: 130px;
            background: #efba0a;
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            color: #003087;
        }

        .impost_before { background: #003087; color: #ffcc00; }

        .report_before span, .accessi_before span, .frutta_before span, 
        .manutenzione_before span, .haccp_before span, .trasporti_before span, .freschi_before span, .impost_before span {
            font-size: 18px;
            font-weight: bold;
        }

        /* --- BOOK ANIMATION --- */
        .book { width: 100px; height: 120px; position: relative; margin: 0 auto; transform-style: preserve-3d; transition: transform 0.5s; }
        .cover {
            width: 100%; height: 100%;
            background: linear-gradient(45deg, #003087 50%, #ecb40c 50%);
            border-radius: 2px 5px 5px 2px;
            position: absolute; z-index: 5;
            transform-origin: left; display: flex; align-items: center; justify-content: center;
        }
        .cover::after { content: "TIGROS"; color: white; font-size: 14px; font-weight: bold; }
        .pages {
            width: 90%; height: 90%; background: white;
            position: absolute; top: 5%; left: 5%; z-index: 1;
            display: flex; flex-direction: column; justify-content: center; gap: 5px; padding: 5px;
        }
        .chart-line { width: 80%; height: 4px; background: #2b75ee; border-radius: 2px; }
        .chart-line.yellow { background: #ffcc00; width: 60%; }
        .book-glass-box:hover .cover { transform: rotateY(-140deg); transition: 1s; }

        /* --- MODAL / FEEDBACK --- */
        .feed {
            position: fixed; bottom: 10px; right: 10px;
            background: rgba(0, 0, 0, 0.5); color: white;
            padding: 8px 12px; border-radius: 12px;
            font-size: 0.9rem; cursor: pointer;
            z-index: 1000;
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }

        .modal-overlay.show { display: flex; opacity: 1; }

        .modal-content {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            width: 450px; max-width: 90%;
            padding: 45px 30px 30px 30px;
            display: flex; flex-direction: column; gap: 15px;
            position: relative;
        }

        .modal-content input, .modal-content textarea {
            width: 100%; border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 48, 135, 0.6); color: white;
            border-radius: 8px; padding: 12px; box-sizing: border-box;
        }

        .btn-salva-feed { background: #ffcc00; color: #003087; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* --- MEDIA QUERIES MOBILE --- */
        @media (max-width: 768px) {
            .user-fullname { display: none; }
            .user-badge { padding: 5px; background: transparent; border: none; }

            nav { padding: 5px 10px; gap: 5px; }

            nav ul {
                justify-content: flex-start;
                flex-wrap: nowrap;
                overflow-x: auto;
                padding: 10px 0;
                gap: 15px;
                scrollbar-width: none; 
            }
            nav ul::-webkit-scrollbar { display: none; }
            nav ul li a { font-size: 0.85rem; }

            .nav-logo img { height: 30px; }

            .container-glass { padding: 20px 10px; gap: 20px; }
            
            .report_before, .frutta_before, .accessi_before, .manutenzione_before, 
            .haccp_before, .trasporti_before, .freschi_before, .impost_before {
                width: 110px; height: 110px;
            }
        }

        /* --- ANIMAZIONI --- */
        @keyframes apparizioneIniziale {
            0% { opacity: 0; filter: blur(20px); transform: scale(0.85); }
            100% { opacity: 1; filter: blur(0px); transform: scale(1); }
        }

        @keyframes welcomeSequence {
            0% { opacity: 0; transform: translateY(30px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-15px); filter: blur(10px); }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <div class="user-badge" onclick="location.href='info_utente.html'">
                <div class="user-initials" id="userInitials">??</div>
                <span class="user-fullname" id="userFullname">Utente</span>
            </div>
        </div>

        <ul>
            <li><a href="Home_new.html">HOME</a></li>
           
            <li><a onclick="confermaEsci()" class="logout">ESCI</a></li>
        </ul>
       
        <div class="nav-right">
            <div class="nav-logo">
                <img src="LOGO_TIGROS_VERTICALE.jpg" alt="Logo Tigros">
            </div>
        </div>
    </nav>

    <div class="container-glass">
        
       
        <div class="glass-box-container" id="box-frutta">
            <div class="frutta-glass-box" onclick="location.href='anagrafica.html'">
                <h2 class="frutta-title">UTENTI REGISTRATI</h2>
                <div class="frutta">
                    <div class="frutta_before"><span>Anagrafica</span></div>
                </div>
            </div>
        </div>


        
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent">
            <button onclick="chiudifeed()" class="close-btn" style="position:absolute; right:15px; top:15px; background:none; border:none; color:white; font-size:24px; cursor:pointer;">&times;</button>
            <h3 style="color: #ffcc00; text-align: center; margin: 0;">Invia FeedBack</h3>
            <input type="text" id="feedUser" readonly style="opacity:0.6;">
            <input type="text" id="feedSubject" placeholder="Oggetto">
            <textarea id="feedText" rows="4" placeholder="Messaggio..."></textarea>
            <button class="btn-salva-feed" onclick="salvaFeedback()">INVIA FEEDBACK</button>
        </div>
    </div>

    <script>
        const autorizzazioni = {
            "Admin": ["book", "pescheria", "accessi", "frutta"],
            "Qualita.Pesce": ["pescheria", "book"],
            "User.Ortofrutta": ["frutta", "book"],
            "Test": ["pescheria"],
            "giacomo bardelli": ["book","accessi", "pescheria", "frutta", "manutenzione", "haccp", "trasporti", "freschi", "impostazioni"],
            "Giacomo Gardelli": ["book","accessi", "pescheria", "frutta", "manutenzione", "haccp", "trasporti", "freschi", "impostazioni"],
            "Ospite": ["book","accessi", "pescheria", "frutta", "manutenzione", "haccp", "trasporti", "freschi"],
            "ermanno lamperti": ["book","accessi", "pescheria", "manutenzione", "haccp"],
            "Ermanno Lamperti": ["book","accessi", "pescheria", "manutenzione", "haccp"]
        };

        window.onload = function() {
            const comingFrom = document.referrer;
            const welcomeBox = document.getElementById('welcomeBox');
            if (comingFrom.includes("index")) {
                welcomeBox.classList.add('mostra-benvenuto');
                setTimeout(() => { welcomeBox.classList.remove('mostra-benvenuto'); }, 3000);
            }

            const nomeUtente = localStorage.getItem("utenteLoggato") || "Ospite";
            document.getElementById('userFullname').innerText = nomeUtente;
            const parti = nomeUtente.split(/[._ ]/); 
            let iniziali = (parti.length > 1) ? parti[0][0] + parti[1][0] : parti[0][0] + (parti[0][1] || "");
            document.getElementById('userInitials').innerText = iniziali.toUpperCase();

            const repartiConsentiti = autorizzazioni[nomeUtente] || ["book"]; 
            const tuttiIBox = ["book", "pescheria", "accessi", "frutta","manutenzione", "haccp", "trasporti", "freschi", "impostazioni"];

            tuttiIBox.forEach(reparto => {
                const boxWrapper = document.getElementById('box-' + reparto);
                if (boxWrapper) {
                    if (repartiConsentiti.includes(reparto)) {
                        boxWrapper.style.display = 'block'; 
                    } else {
                        boxWrapper.remove(); 
                    }
                }
            });
        };

        function vaiReport(){ window.location.href = "ControlloPescheria.html"; }
        function vaiBook(){ window.location.href = "book.html"; }
        function sviluppo(){ alert("Sezione non disponibile.\nIn fase di sviluppo."); }

        function confermaEsci() {
            if (confirm("Sei sicuro di voler uscire dalla Piattaforma Tigros?")) {
                localStorage.removeItem("utenteLoggato");
                window.location.href = "index.html";
            }
        }

        function aprifeed(e) {
            const overlay = document.getElementById('modalOverlay');
            document.getElementById('feedUser').value = document.getElementById('userFullname').innerText;
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('show'), 10);
        }

        function chiudifeed() {
            const overlay = document.getElementById('modalOverlay');
            overlay.classList.remove('show');
            setTimeout(() => overlay.style.display = 'none', 400);
        }

        async function salvaFeedback() {
            const btn = event.target;
            const payload = {
                user: document.getElementById('feedUser').value,
                subject: document.getElementById('feedSubject').value,
                text: document.getElementById('feedText').value,
                azione: 'inviaFeedback'
            };

            if (!payload.subject || !payload.text) {
                alert("Compila tutti i campi!");
                return;
            }

            btn.innerText = "INVIO IN CORSO...";
            btn.disabled = true;

            try {
                await fetch("https://script.google.com/macros/s/AKfycbxjgzkWhP284tzaZjKS2_siazqUYIJcNO8hu6SsktyTWbsxqORHkpuj7OUia2nRDaFWjQ/exec", {
                    method: 'POST',
                    mode: 'no-cors', 
                    body: JSON.stringify(payload)
                });
                alert("✅ Feedback inviato con successo!");
                chiudifeed();
            } catch (e) {
                alert("Errore nell'invio.");
            } finally {
                btn.innerText = "INVIA FEEDBACK";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
