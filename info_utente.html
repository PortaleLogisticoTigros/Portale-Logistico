<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piattaforma Tigros - Utente</title>
    <link rel="icon" type="image/png" href="images.png">
    <link rel="apple-touch-icon" href="images.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>

         @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        body {
            margin: 0;
            background: linear-gradient(135deg, #2b75ee 0%, #a0861d 100%);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 10;
        }

        .nav-left { flex: 1; display: flex; justify-content: flex-start; }

        .user-badge {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255, 255, 255, 0.15);
            padding: 5px 12px; border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .user-initials {
            width: 30px; height: 30px; background: #ffcc00; color: #003087;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 0.85rem; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .user-fullname { color: white; font-size: 0.85rem; text-transform: capitalize; }

         nav ul { 
            list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; 
            flex: 1; justify-content: center; text-align: center;
        }

        li a {
            text-decoration: none; color: white; font-family: 'Montserrat', sans-serif; 
            font-size: 1.15rem; transition: all 0.4s ease; cursor: pointer; white-space: nowrap;
        }

        .nav-right { flex: 1; display: flex; justify-content: flex-end; }

        .nav-logo img { height: 38px; width: auto; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2)); }

        ul:hover li a { filter: blur(3px); opacity: 0.5; transform: scale(0.9); }
        ul li a:hover { filter: blur(0px); opacity: 1; transform: scale(1.2); color: #ffcc00; }
        li a.logout { color: #efba0a; }
        li a.logout:hover { color: #ff0000; text-shadow: 0 0 15px rgba(255, 0, 0, 0.6); }

        .container-main {
            display: flex; flex-direction: row; padding: 40px; justify-content: center;
            align-items: center; overflow-y: auto; height: 100%; box-sizing: border-box;
        }

         .container-iniziali {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            padding: 20px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2); text-align: center; 
            width: 400px; height: 400px; max-width: 90vw; box-sizing: border-box;
            display: flex; align-items: center; justify-content: center;
            animation: apparizioneIniziale 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        .iniziali {
            font-size: 120px; font-weight: 900; background-color: #ffcc00; 
            color: #003087; border-radius: 50%; width: 250px; height: 250px;
            display: flex; align-items: center; justify-content: center; margin: 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .container-info {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2); width: 600px; height: 400px;
            max-width: 90vw; margin-left: 40px; box-sizing: border-box;
            animation: apparizioneIniziale 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            display: flex; flex-direction: column; justify-content: center;
        }

        .container-info h4 {
            color: #ffcc00; font-family: 'Montserrat', sans-serif; font-size: 1.5rem;
            font-weight: 700; background-color: #003087; padding: 5px 20px;
            border-radius: 15px; width: fit-content; margin: -50px 0 20px 0; 
            text-align: left; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .elenco-info p {
            color:#ffcc00; font-family: 'Montserrat', sans-serif; font-size: 22px;
            padding: 12px 10px; margin: 0; display: flex; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .elenco-info p:last-child { border-bottom: none; }
        .elenco-info span { margin-left: 20px; color: white; font-weight: 600; }
        #infoEmail { font-size: 20px; }

        @keyframes apparizioneIniziale {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .toggle-password {
            margin-left: auto !important; cursor: pointer; font-size: 22px !important;
            filter: grayscale(1); transition: 0.2s; user-select: none;
        }
        .toggle-password:hover { filter: grayscale(0); transform: scale(1.2); }

        /* --- STILI MENU FLOATING E MODALE --- */
        .fab-container {
            position: fixed; bottom: 30px; right: 30px; z-index: 1000;
        }
        
        .fab-button {
            width: 55px; height: 55px; background-color:#ffcc00; color: #003087;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 28px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 2px solid #ffcc00; transition: transform 0.3s;
        }
        .fab-button:hover { transform: scale(1.1); }
        
        .fab-menu {
            position: absolute; bottom: 70px; right: 0; background: rgba(0, 48, 135, 0.95);
            backdrop-filter: blur(10px); border: 1px solid #ffcc00; border-radius: 10px;
            padding: 10px 0; display: none; flex-direction: column; min-width: 200px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .fab-menu.active { display: flex; animation: fadeUp 0.3s ease; }
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }

        .fab-item {
            padding: 12px 20px; color: white; font-family: 'Montserrat', sans-serif;
            font-size: 14px; cursor: pointer; transition: background 0.2s;
        }
        .fab-item:hover { background: #ffcc00; color: #003087;}

        /* Modale Password */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
            opacity: 0; visibility: hidden; pointer-events: none; transition: all 0.3s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; pointer-events: auto; }
        
        .modal-content {
            background: rgba(0, 48, 135, 0.9); border: 2px solid #ffcc00; border-radius: 20px;
            padding: 30px; width: 90%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: scale(0.8); transition: transform 0.3s; display: flex; flex-direction: column; gap: 15px;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
        
        .modal-content h3 { color: #ffcc00; margin: 0 0 10px 0; font-family: 'Montserrat', sans-serif; text-align: center; }
        .modal-content input {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255, 204, 0, 0.5); 
            background: rgba(255, 255, 255, 0.1); color: white; font-family: 'Montserrat', sans-serif; 
            font-size: 16px; box-sizing: border-box; outline: none;
        }
        .modal-content input::placeholder { color: rgba(255, 255, 255, 0.6); }
        .modal-content input:focus { border-color: #ffcc00; background: rgba(255, 255, 255, 0.2); }
        
        .modal-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .btn-modal { flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; font-family: 'Montserrat', sans-serif; }
        .btn-salva { background: #ffcc00; color: #003087; }
        .btn-salva:hover { filter: brightness(1.1); transform: scale(1.02); }
        .btn-annulla { background: rgba(255,255,255,0.2); color: white; }
        .btn-annulla:hover { background: rgba(255,255,255,0.3); }

        /* ------------------------------------------------------------------ */
        /* MEDIA QUERIES SOLO PER MOBILE (Fino a 768px)                       */
        /* ------------------------------------------------------------------ */
        @media (max-width: 768px) {
            body { overflow-y: auto !important; height: auto !important; min-height: 100vh; }
            nav { flex-wrap: wrap; padding: 10px; gap: 10px; justify-content: space-between; }
            .user-fullname { display: none; }
            .nav-left, .nav-right { flex: 0 0 auto; }
            
            nav ul {
                justify-content: flex-start; flex-wrap: nowrap; overflow-x: auto;
                width: 100%; padding: 10px 0; gap: 15px; scrollbar-width: none; 
            }
            nav ul::-webkit-scrollbar { display: none; }
            nav ul li a { font-size: 0.9rem; }
            .nav-logo img { height: 30px; }

            .container-main { flex-direction: column; padding: 20px 10px; gap: 30px; height: auto; overflow-y: visible; padding-bottom: 100px; }
            .container-iniziali, .container-info { width: 100%; max-width: 100%; margin-left: 0; height: auto; }
            .container-iniziali { padding: 40px 20px; }
            .iniziali { width: 150px; height: 150px; font-size: 60px; }
            .container-info { padding: 20px 15px; }
            .container-info h4 { font-size: 1.2rem; margin: -35px auto 20px auto; }
            .elenco-info { padding: 0 !important; }
            .elenco-info p { flex-direction: column; align-items: flex-start; gap: 5px; font-size: 16px; padding: 15px 10px; background: rgba(0,0,0,0.1); border-bottom: none; border-radius: 10px; margin-bottom: 10px; }
            .elenco-info span { margin-left: 0; font-size: 18px !important; word-break: break-all; }
            .elenco-info p:last-child { flex-direction: row; flex-wrap: wrap; align-items: center; }
            .elenco-info p:last-child strong { width: 100%; margin-bottom: 5px; }
        }

    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <div class="user-badge">
                <div class="user-initials" id="userInitials">??</div>
                <span class="user-fullname" id="userFullname">Utente</span>
            </div>
        </div>

        <ul>
            <li><a href="Home_new.html">HOME</a></li>
            <li><a href="Viaggi.html">DASHBOARD VIAGGI</a></li>
            <li><a href="Ordini.html">DASHBOARD ORDINI</a></li>
            <li><a href="Ricevimenti.html">DASHBOARD RICEVIMENTI</a></li>
            <li><a onclick="confermaEsci()" class="logout">ESCI</a></li>
        </ul>

        <div class="nav-right">
            <div class="nav-logo">
                <img src="LOGO_TIGROS_VERTICALE.jpg" alt="Logo Tigros">
            </div>
        </div>
    </nav>

    <div class="container-main">
        <div class="container-iniziali">
            <h1 class="iniziali" id="iniziali">??</h1>
        </div>
        <div class="container-info">
            <h4>Dati Personali</h4>
            <div class="elenco-info">
                <p><strong>Nome:</strong> <span id="infoNomeCompleto">Nome</span></p>
                <p><strong>Cognome:</strong> <span id="infoCognome">Cognome</span></p>
                <p><strong>Email:</strong> <span id="infoEmail">email@example.com</span></p>
                <p>
                    <strong>Password:</strong> 
                    <span id="infoPassword">••••••••</span> 
                    <span class="toggle-password" id="togglePasswordBtn" onclick="togglePassword()">👁️</span>
                </p>
            </div>
        </div>
    </div>

    <div class="fab-container">
        <div class="fab-menu" id="fabMenu">
            <div class="fab-item" onclick="apriModalePassword()">✏️ Modifica Password</div>
            </div>
        <div class="fab-button" onclick="toggleMenu(event)">⋮</div>
    </div>

    <div class="modal-overlay" id="modalPassword">
        <div class="modal-content">
            <h3>Modifica Password</h3>
            <input type="password" id="oldPassword" placeholder="Password Attuale">
            <input type="password" id="newPassword" placeholder="Nuova Password">
            <input type="password" id="confirmPassword" placeholder="Conferma Nuova Password">
            <div class="modal-buttons">
                <button class="btn-modal btn-salva" id="btnSalvaPwd" onclick="salvaNuovaPassword()">SALVA</button>
                <button class="btn-modal btn-annulla" onclick="chiudiModalePassword()">ANNULLA</button>
            </div>
        </div>
    </div>
    
    <script>
    const webAppUrl = "https://script.google.com/macros/s/AKfycbww6k-ZzmO4ybvAUDto2GYOsoJ6vnCnF16cUpdO2ES_bNmmNPMCV0SKHTrti-P4SbzY/exec";
    let passwordReale = "";

    window.onload = async function() {
        const nomeUtente = localStorage.getItem("utenteLoggato") || "Ospite";
        document.getElementById('userFullname').innerText = nomeUtente;
        
        const parti = nomeUtente.split(/[._ ]/); 
        let iniziali = (parti.length > 1) ? (parti[0][0] + parti[1][0]) : (parti[0][0] + (parti[0][1] || ""));
        document.getElementById('userInitials').innerText = iniziali.toUpperCase();
        document.getElementById('iniziali').innerText = iniziali.toUpperCase();
        document.getElementById('infoNomeCompleto').innerText = (parti[0] || "").toUpperCase();
        document.getElementById('infoCognome').innerText = (parti[1] || "").toUpperCase();

        document.getElementById('infoEmail').innerText = "Caricamento...";
        document.getElementById('infoPassword').innerText = "••••••••";

        try {
            console.log(`Recupero dati per utente: ${nomeUtente}`);
            const response = await fetch(`${webAppUrl}?azione=recuperaProfilo&utente=${encodeURIComponent(nomeUtente)}`);
            const data = await response.json();

            if (data && !data.error) {
                document.getElementById('infoEmail').innerText = data.email;
                passwordReale = data.password;
            } else {
                document.getElementById('infoEmail').innerText = "Errore recupero dati";
                passwordReale = "Non disponibile";
            }
        } catch (error) {
            console.error("Errore recupero dati:", error);
            document.getElementById('infoEmail').innerText = "Errore connessione";
        }
    };

    function togglePassword() {
        const pwdSpan = document.getElementById('infoPassword');
        if (pwdSpan.innerText === "••••••••") {
            pwdSpan.innerText = passwordReale;
        } else {
            pwdSpan.innerText = "••••••••";
        }
    }

    function confermaEsci() {
        if (confirm("Sei sicuro di voler uscire dalla Piattaforma Tigros?")) {
            localStorage.removeItem("utenteLoggato");
            window.location.href = "index.html";
        }
    }


    function toggleMenu(event) {
        event.stopPropagation(); 
        document.getElementById('fabMenu').classList.toggle('active');
    }

   
    document.addEventListener('click', function(event) {
        const menu = document.getElementById('fabMenu');
        if (menu.classList.contains('active')) {
            menu.classList.remove('active');
        }
    });

    function apriModalePassword() {
        document.getElementById('fabMenu').classList.remove('active');
        document.getElementById('oldPassword').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
        document.getElementById('modalPassword').classList.add('active');
    }

    function chiudiModalePassword() {
        document.getElementById('modalPassword').classList.remove('active');
    }

    async function salvaNuovaPassword() {
        const oldP = document.getElementById('oldPassword').value;
        const newP = document.getElementById('newPassword').value;
        const confP = document.getElementById('confirmPassword').value;

        if (!oldP || !newP || !confP) {
            alert("Per favore, compila tutti i campi.");
            return;
        }
        if (oldP !== passwordReale) {
            alert("La password attuale inserita non è corretta.");
            return;
        }
        if (newP !== confP) {
            alert("La nuova password e la conferma non coincidono.");
            return;
        }

        const btn = document.getElementById('btnSalvaPwd');
        btn.innerText = "SALVATAGGIO...";
        btn.disabled = true;

        const nomeUtente = localStorage.getItem("utenteLoggato") || "Ospite";

        try {
            // Effettua la chiamata GET all'Apps Script passando l'azione cambiaPassword
            const response = await fetch(`${webAppUrl}?azione=cambiaPassword&utente=${encodeURIComponent(nomeUtente)}&nuovaPassword=${encodeURIComponent(newP)}`);
            const data = await response.json();

            if (data && data.success) {
                alert("Password aggiornata con successo!");
                passwordReale = newP; // Aggiorna la variabile locale senza dover ricaricare la pagina
                
                // Se la password era visibile, nascondila per sicurezza
                document.getElementById('infoPassword').innerText = "••••••••";
                chiudiModalePassword();
            } else {
                alert("Errore durante l'aggiornamento. Verifica i permessi o riprova più tardi.");
            }
        } catch (error) {
            console.error("Errore salvataggio:", error);
            alert("Impossibile connettersi al server per modificare la password.");
        } finally {
            btn.innerText = "SALVA";
            btn.disabled = false;
        }
    }

    </script>

</body>
</html>
