<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piattaforma Tigros - Anagrafiche Utenti</title>
    <link rel="icon" type="image/png" href="images.png">
    <link rel="apple-touch-icon" href="images.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>

         @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        body {
            margin: 0;
            background: linear-gradient(135deg, #2b75ee 0%, #a0861d 100%);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        /* --- NAVIGAZIONE --- */
        nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 10;
        }

        .nav-left { flex: 1; display: flex; justify-content: flex-start; }

        .user-badge {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255, 255, 255, 0.15);
            padding: 5px 12px; border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        .user-initials {
            width: 30px; height: 30px; background: #ffcc00; color: #003087;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 0.85rem; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .user-fullname { color: white; font-size: 0.85rem; text-transform: capitalize; }

         nav ul { 
            list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; 
            flex: 1; justify-content: center; text-align: center;
        }

        li a {
            text-decoration: none; color: white; font-family: 'Montserrat', sans-serif; 
            font-size: 1.15rem; transition: all 0.4s ease; cursor: pointer; white-space: nowrap;
        }

        .nav-right { flex: 1; display: flex; justify-content: flex-end; }
        .nav-logo img { height: 38px; width: auto; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2)); }

        ul:hover li a { filter: blur(3px); opacity: 0.5; transform: scale(0.9); }
        ul li a:hover { filter: blur(0px); opacity: 1; transform: scale(1.2); color: #ffcc00; }
        li a.logout { color: #efba0a; }
        li a.logout:hover { color: #ff0000; text-shadow: 0 0 15px rgba(255, 0, 0, 0.6); }

        /* --- CONTENITORE PRINCIPALE E GRIGLIA UTENTI --- */
        .container-main {
            display: flex;
            flex-direction: column;
            padding: 30px 40px;
            overflow-y: auto;
            height: 100%;
            box-sizing: border-box;
        }

        .page-title {
            color: #ffcc00;
            font-size: 2rem;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .utenti-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        /* --- CARD UTENTE COMPATTA (Riga Singola) --- */
        .user-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 15px 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: transform 0.2s, background 0.2s, opacity 0.3s;
            animation: apparizioneIniziale 0.5s ease-out forwards;
            position: relative;
        }

        .user-card:hover {
            transform: scale(1.01);
            background: rgba(255, 255, 255, 0.15);
        }

        .card-iniziali {
            width: 50px;
            height: 50px;
            min-width: 50px;
            background-color: #ffcc00;
            color: #003087;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 900;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .card-info {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: space-between; 
            gap: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .info-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 3px;
        }

        .info-value {
            font-size: 1.1rem;
            color: #ffcc00;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .info-value.email {
            color: white;
            font-weight: normal;
        }

        .password-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-password {
            cursor: pointer;
            font-size: 18px;
            filter: grayscale(1);
            transition: 0.2s;
            user-select: none;
            opacity: 0.7;
        }
        
        .toggle-password:hover {
            filter: grayscale(0);
            opacity: 1;
            transform: scale(1.2);
        }

        /* --- BOTTONE ELIMINA --- */
        .btn-delete {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-delete:hover {
            color: #ff4d4d;
            transform: scale(1.2);
            filter: drop-shadow(0 0 5px rgba(255, 77, 77, 0.5));
        }

        /* Loader */
        #loader {
            color: #ffcc00;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            margin-top: 50px;
        }

        .btn-indietro {
            background-color: #ffcc00;
            border-color: #ffcc00;
            color:#003087;
            align-self: center;
            padding: 8px 20px;
            margin-right: 25px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        
        .toggle-password {
            margin-left: auto !important; cursor: pointer; font-size: 22px !important;
            filter: grayscale(1); transition: 0.2s; user-select: none;
        }
        .toggle-password:hover { filter: grayscale(0); transform: scale(1.2); }

        /* --- STILI MENU FLOATING E MODALE --- */
        .fab-container {
            position: fixed; bottom: 30px; right: 30px; z-index: 1000;
        }
        
        .fab-button {
            width: 55px; height: 55px; background-color:#ffcc00; color: #003087;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 28px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 2px solid #ffcc00; transition: transform 0.3s;
        }
        .fab-button:hover { transform: scale(1.1); }
        
        .fab-menu {
            position: absolute; bottom: 70px; right: 0; background: rgba(0, 48, 135, 0.95);
            backdrop-filter: blur(10px); border: 1px solid #ffcc00; border-radius: 10px;
            padding: 10px 0; display: none; flex-direction: column; min-width: 200px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .fab-menu.active { display: flex; animation: fadeUp 0.3s ease; }
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }

        .fab-item {
            padding: 12px 20px; color: white; font-family: 'Montserrat', sans-serif;
            font-size: 14px; cursor: pointer; transition: background 0.2s;
        }
        .fab-item:hover { background: #ffcc00; color: #003087;}

        /* Modale Password */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
            opacity: 0; visibility: hidden; pointer-events: none; transition: all 0.3s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; pointer-events: auto; }
        
        .modal-content {
            background: rgba(0, 48, 135, 0.9); border: 2px solid #ffcc00; border-radius: 20px;
            padding: 30px; width: 90%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: scale(0.8); transition: transform 0.3s; display: flex; flex-direction: column; gap: 15px;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
        
        .modal-content h3 { color: #ffcc00; margin: 0 0 10px 0; font-family: 'Montserrat', sans-serif; text-align: center; }
        .modal-content input {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255, 204, 0, 0.5); 
            background: rgba(255, 255, 255, 0.1); color: white; font-family: 'Montserrat', sans-serif; 
            font-size: 16px; box-sizing: border-box; outline: none;
        }
        .modal-content input::placeholder { color: rgba(255, 255, 255, 0.6); }
        .modal-content input:focus { border-color: #ffcc00; background: rgba(255, 255, 255, 0.2); }
        
        .modal-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .btn-modal { flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; font-family: 'Montserrat', sans-serif; }
        .btn-salva { background: #ffcc00; color: #003087; }
        .btn-salva:hover { filter: brightness(1.1); transform: scale(1.02); }
        .btn-annulla { background: rgba(255,255,255,0.2); color: white; }
        .btn-annulla:hover { background: rgba(255,255,255,0.3); }

        @keyframes apparizioneIniziale {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* --- MEDIA QUERIES MOBILE --- */
        @media (max-width: 768px) {
            body { overflow-y: auto !important; height: auto !important; min-height: 100vh; }
            nav { flex-wrap: wrap; padding: 10px; gap: 10px; justify-content: space-between; }
            .user-fullname { display: none; }
            .nav-left, .nav-right { flex: 0 0 auto; }
            
            nav ul {
                justify-content: flex-start; flex-wrap: nowrap; overflow-x: auto;
                width: 100%; padding: 10px 0; gap: 15px; scrollbar-width: none; 
            }
            nav ul::-webkit-scrollbar { display: none; }
            nav ul li a { font-size: 0.9rem; }
            .nav-logo img { height: 30px; }

            .container-main { padding: 20px 10px; }
            .page-title { font-size: 1.5rem; text-align: center; }

            .user-card {
                flex-direction: column; 
                align-items: flex-start;
                gap: 15px;
                padding: 20px;
            }

            .card-iniziali {
                width: 60px; height: 60px; font-size: 24px;
            }

            .card-info {
                flex-direction: column; 
                align-items: flex-start;
                width: 100%;
                gap: 10px;
            }

            .info-item {
                width: 100%;
                background: rgba(0,0,0,0.1);
                padding: 8px 10px;
                border-radius: 8px;
            }

           

            .info-value { white-space: normal; word-break: break-all; }
            .password-container { justify-content: space-between; width: 100%; }


            /* Il cestino su mobile si posiziona in alto a destra sulla card */
            .btn-delete {
                position: absolute;
                top: 20px;
                right: 20px;
                font-size: 24px;
            }
        }


    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <div class="user-badge" onclick="location.href='info_utente.html'">
                <div class="user-initials" id="userInitials">??</div>
                <span class="user-fullname" id="userFullname">Utente</span>
            </div>
        </div>

        <ul>
            <li><a href="Home_new.html">HOME</a></li>
           
            <li><a onclick="confermaEsci()" class="logout">ESCI</a></li>
        </ul>

        <div class="nav-right">
            
                <button class="btn-indietro" onclick="location.href='home_impostazioni.html'">INDIETRO</button>
      
            <div class="nav-logo">
                <img src="LOGO_TIGROS_VERTICALE.jpg" alt="Logo Tigros">
            </div>
        </div>
    </nav>

    <div class="container-main">
        <h1 class="page-title">Anagrafiche Utenti</h1>
        
        <div id="loader">Caricamento anagrafiche in corso...</div>
        
        <div class="utenti-grid" id="utentiContainer">
            </div>
    </div>

    <div class="fab-container" id="fab-container">
        <div class="fab-menu" id="fabMenu">
            <div class="fab-item" onclick="apriModalePassword()"><i class="fa-solid fa-user-plus"></i> Crea Utente</div>
            </div>
        <div class="fab-button" onclick="toggleMenu(event)">⋮</div>
    </div>

    <div class="modal-overlay" id="modalPassword">
        <div class="modal-content">
            <h3>Creazione Nuovo Utente</h3>
            <input type="email" id="email" placeholder="Email">
            <input type="text" id="id-name" placeholder="Nome">
            <input type="text" id="id-cognome" placeholder="Cognome" >
            <input type="password" id="confirmPassword" placeholder="Password">
            <div class="modal-buttons">
                <button class="btn-modal btn-salva" id="btnSalvaPwd" onclick="salvaNuovoUtente()">CREA UTENTE</button>
                <button class="btn-modal btn-annulla" onclick="chiudiModalePassword()">ANNULLA</button>
            </div>
        </div>
    </div>

    <script>

        const webAppUrl = "https://script.google.com/macros/s/AKfycbylGfOredFlZPng9z9fVyP3D8h0brSBPuz9qfoA_Ro9LKNlXqYDuTaD43cq1-tkMzdH/exec";  
        let passwordData = {};

        window.onload = async function() {
            
            const bottoneAdmin = document.getElementById('fab-container');

            const nomeUtente = localStorage.getItem("utenteLoggato") || "Ospite";
            document.getElementById('userFullname').innerText = nomeUtente;
            const parti = nomeUtente.split(/[._ ]/); 
            let iniziali = (parti.length > 1) ? (parti[0][0] + parti[1][0]) : (parti[0][0] + (parti[0][1] || ""));
                document.getElementById('userInitials').innerText = iniziali.toUpperCase();

                let utenteLoggatoFormattato = nomeUtente.trim().toUpperCase();
                    console.log("Utente loggato formattato:", utenteLoggatoFormattato);

                            if(utenteLoggatoFormattato !== 'GIACOMO BARDELLI'){
                                bottoneAdmin.remove();
                            } 


            await caricaTuttiGliUtenti();

        };

        async function caricaTuttiGliUtenti() {
            const loader = document.getElementById('loader');
            const container = document.getElementById('utentiContainer');

            try {
                const response = await fetch(`${webAppUrl}?azione=recuperaTutti`);
                const data = await response.json();

                if (data && data.utenti && data.utenti.length > 0) {
                    loader.style.display = 'none';
                    generaCardUtenti(data.utenti, container);
                } else {
                    loader.innerText = "Nessun utente trovato.";
                }
            } catch (error) {
                console.error("Errore recupero dati:", error);
                loader.innerText = "Errore durante il caricamento delle anagrafiche.";
            }
        }

         function toggleMenu(event) {
            event.stopPropagation(); 
            document.getElementById('fabMenu').classList.toggle('active');
        }
        document.addEventListener('click', function(event) {
                const menu = document.getElementById('fabMenu');
                if (menu.classList.contains('active')) {
                    menu.classList.remove('active');
                }
            });

        function apriModalePassword() {
                document.getElementById('fabMenu').classList.remove('active');
                document.getElementById('email').value = '';
                document.getElementById('id-name').value = '';
                document.getElementById('id-cognome').value = '';
                document.getElementById('confirmPassword').value = '';
                document.getElementById('modalPassword').classList.add('active');
            }

    function chiudiModalePassword() {
        document.getElementById('modalPassword').classList.remove('active');
    }


        function generaCardUtenti(utenti, container) {
            container.innerHTML = ""; 

            utenti.forEach((utente, index) => {
                const partiNome = (utente.nome || "").split(/[._ ]/); 
                let ini = (partiNome.length > 1) ? (partiNome[0][0] + partiNome[1][0]) : (partiNome[0][0] + (partiNome[0][1] || ""));
                ini = (ini || "??").toUpperCase();

                const pwdId = `pwd_${index}`;
                passwordData[pwdId] = utente.password || "";

                const card = document.createElement('div');
                card.className = 'user-card';
                card.style.animationDelay = `${index * 0.1}s`; 

                card.innerHTML = `
                    <div class="card-iniziali">${ini}</div>
                    <div class="card-info">
                        <div class="info-item" style="flex: 1.5;">
                            <span class="info-label">Nome Completo</span>
                            <span class="info-value">${utente.nome || "-"}</span>
                        </div>
                        
                        <div class="info-item" style="flex: 2;">
                            <span class="info-label">Email</span>
                            <span class="info-value email">${utente.email || "-"}</span>
                        </div>
                        
                        <div class="info-item" style="flex: 1;">
                            <span class="info-label">Password</span>
                            <div class="password-container">
                                <span class="info-value" id="${pwdId}">••••••••</span>
                                <span class="toggle-password" onclick="togglePassword('${pwdId}')">👁️</span>
                            </div>
                        </div>
                    </div>
                    <button class="btn-delete" title="Elimina Utente" onclick="eliminaUtente('${utente.nome}', this.parentElement)">🗑️</button>
                `;
                container.appendChild(card);
            });
        }

        function togglePassword(elementId) {
                const utenteLoggato = localStorage.getItem("utenteLoggato") || "Ospite";
                    if(utenteLoggato.trim().toUpperCase() !== 'GIACOMO BARDELLI'){
                        alert("Non hai i permessi per visualizzare le password.");
                        return;
                    }

            const pwdSpan = document.getElementById(elementId);
            const pwdReal = passwordData[elementId];
            
            if (pwdSpan.innerText === "••••••••") {
                pwdSpan.innerText = pwdReal;
            } else {
                pwdSpan.innerText = "••••••••";
            }
        }

        async function eliminaUtente(nomeDaEliminare, cardElement) {
            const utenteLoggato = localStorage.getItem("utenteLoggato") || "Ospite";
                    if(utenteLoggato.trim().toUpperCase() !== 'GIACOMO BARDELLI'){
                        alert("Non hai i permessi per eliminare gli utenti.");
                        return;
                    }


            if (!confirm(`ATTENZIONE: Sei sicuro di voler eliminare l'utente "${nomeDaEliminare}" dal database? L'operazione è irreversibile.`)) {
                return;
            }

   
            cardElement.style.opacity = '0.5';
            cardElement.style.pointerEvents = 'none';

            try {
  
                const response = await fetch(`${webAppUrl}?azione=eliminaUtente&utente=${encodeURIComponent(nomeDaEliminare)}`);
                const data = await response.json();

                if (data && data.success) {
                    // Animazione di uscita prima di rimuoverlo dal DOM
                    cardElement.style.transform = 'scale(0.9)';
                    cardElement.style.opacity = '0';
                    setTimeout(() => cardElement.remove(), 300);
                } else {
                    alert("Errore durante l'eliminazione: " + (data.error || "Utente non trovato"));
                    cardElement.style.opacity = '1';
                    cardElement.style.pointerEvents = 'auto';
                }
            } catch (error) {
                console.error("Errore di rete durante eliminazione:", error);
                alert("Impossibile connettersi al server per l'eliminazione.");
                cardElement.style.opacity = '1';
                cardElement.style.pointerEvents = 'auto';
            }
        }

        function confermaEsci() {
            if (confirm("Sei sicuro di voler uscire dalla Piattaforma Tigros?")) {
                localStorage.removeItem("utenteLoggato");
                window.location.href = "index.html";
            }
        }


                async function salvaNuovoUtente() {
                    
                    const indirizzoMail = document.getElementById('email').value.trim();
                    const nome = document.getElementById('id-name').value.trim();
                    const cognome = document.getElementById('id-cognome').value.trim();
                    const passwordConfermata = document.getElementById('confirmPassword').value;

                            if (!indirizzoMail || !nome || !cognome || !passwordConfermata) {
                                alert("Tutti i campi sono obbligatori. Per favore, compilali prima di procedere.");
                                return;
                            }
                                const btn = document.getElementById('btnSalvaPwd');
                                btn.innerText = "CREAZIONE IN CORSO...";
                                btn.disabled = true;

                                const utenteLoggato = localStorage.getItem("utenteLoggato") || "Ospite";

                                const params = new URLSearchParams({
                                    azione: 'creazioneUtenza',
                                    nomeUtente: nome,
                                    cognome: cognome,
                                    email: indirizzoMail,
                                    nuovaPassword: passwordConfermata,
                                    creatoDa: utenteLoggato
                                });

                                try {
                                    // FACCIAMO UNA RICHIESTA GET ATTACCANDO I PARAMETRI ALL'URL
                                    // Niente mode: 'no-cors', niente body!
                                    const finalUrl = `${webAppUrl}?${params.toString()}`;
                                    
                                    const response = await fetch(finalUrl, {
                                        method: 'GET'
                                    });

                                    const data = await response.json();

                                    console.log("Risposta dal server:", data);



                                    if (data && data.success) {
                                        alert("Utente aggiunto con successo!");

                                        document.getElementById('email').value = '';
                                        document.getElementById('id-name').value = '';
                                        document.getElementById('id-cognome').value = '';
                                        document.getElementById('confirmPassword').value = '';
                                    } else {
                                        alert("Errore dal server: " + (data.error || "Riprova più tardi."));
                                    }

                                } catch (error) {
                                    console.error("Errore salvataggio:", error);
                                    alert("Errore di connessione o CORS. Verifica che la Web App sia pubblicata correttamente.");
                                } finally {
                                    btn.innerText = "CREA UTENTE";
                                    btn.disabled = false;
                                    await caricaTuttiGliUtenti(); 
                                }
                            }


    </script>

</body>
</html>
