<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piattaforma Tigros - Dashboard Inevasi</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #2b75ee 0%, #a0861d 100%);
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

       nav {
                background: rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(10px);
                padding: 5px 20px; 
                height: 60px;     
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-bottom: 1px solid rgba(255, 255, 255, 0.2);
                position: relative;
                z-index: 100;
            }

            .nav-right .nav-logo img {
                height: 45px;     
                width: auto;      
                display: block;
                margin-right: 10px;
            }

        .nav-left { flex: 1; display: flex; justify-content: flex-start; }
        .user-badge {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255, 255, 255, 0.15);
            padding: 5px 12px; border-radius: 50px;
        }
        .user-initials {
            width: 30px; height: 30px;
            background: #ffcc00; color: #003087;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-family: Impact;
        }
        .user-fullname { color: white; font-size: 0.85rem; font-weight: 600; }

        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; flex: 2; justify-content: center; }
        li a { text-decoration: none; color: white; font-family: Impact; font-size: 1.15rem; cursor: pointer; }

        .container-glass {
            position: absolute;
            top : 8%; left: 1%;
            width: 98%; height: 90%;
            z-index: 10;
        }

 
        .laterale-glass-box {
            position: absolute;
            width: 400px; height: 950px; padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .elementi_lato {
            font-family: Impact; color: #ffcc00; font-size: 25px;
            list-style: circle; display: flex; flex-direction: column; gap: 50px;
        }


        .centrale-glass-box {
            position: absolute;
            display: flex; flex-direction: column; gap: 20px; padding: 40px;
            width: 450px; height: 320px; top: 1px; left: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); border-radius: 20px;
        }

        .input-group { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .input-group label { font-family: Impact; color: #ffcc00; font-size: 1rem; }
        .input-group input { width: 200px; height: 35px; border-radius: 8px; border: none; padding: 0 10px; }


        .week-glass-box {
            position: absolute; width: 1200px; height: 317px; top: 1px; left: 1050px; padding: 30px;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .gruppoWeek { display: flex; justify-content: space-around; width: 100%; }
        .gruppoWeek label { display: flex; flex-direction: column; align-items: center; font-family: Impact; font-size: 20px; gap: 10px; color: #ffcc00; }
        .gruppoWeek span { color: white; font-size: 18px; font-family: Verdana; background: rgba(255, 204, 0, 0.15); padding: 2px 10px; border-radius: 5px; min-width: 50px; text-align: center; }
        

        .riepilogo-glass-box {
            position: absolute; width: 1750px; height: 530px; padding: 20px; top: 420px; left: 500px;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2);
            display: block !important; overflow: hidden;
        }

        .bnt_aggiorna {
            background: #ffcc00; color: #003087; font-family: Impact;
            padding: 5px 15px; border-radius: 8px; border: none; cursor: pointer;
        }
        .btn-prev{
            background: #ffcc00; color: #003087; font-family: Impact;
            padding: 5px 15px; border-radius: 8px; border: none; cursor: pointer;
        }
        
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <div class="user-badge">
                <div class="user-initials" id="userInitials">??</div>
                <span class="user-fullname" id="userFullname">Utente</span>
            </div>
        </div>
        <ul>
            <li><a href="#" style="color: #ffcc00;">HOME</a></li>
            <li><a onclick="confermaEsci()" style="color: #efba0a;">ESCI</a></li>
            <li><button class="bnt_aggiorna" onclick="caricaDatiSettimana()">AGGIORNA DATI</button></li>
            <li><button class="btn-prev"onclick="location.href='home_freschi.html'">INDIETRO</button></li>
        </ul>
        <div class="nav-right">
            <div class="nav-logo"><img src="LOGO_TIGROS_VERTICALE.jpg" alt="Logo Tigros"></div>
        </div>
    </nav>

    <div class="container-glass">
        <div class="laterale-glass-box">
            <ul class="elementi_lato">
                <li>Inserimento Inevasi</li>
                <li>Saturazione</li>
                <li>Storico</li>
            </ul>
        </div>

        <div class="week-glass-box">
            <div class="gruppoWeek">
                <label>LUN <span id="LunOrd">0</span><span id="LunEva">0</span><span id="LunInev">0</span><span id="LunInevPer">0%</span></label>
                <label>MAR <span id="MarOrd">0</span><span id="MarEva">0</span><span id="MarInev">0</span><span id="MarInevPer">0%</span></label>
                <label>MER <span id="MerOrd">0</span><span id="MerEva">0</span><span id="MerInev">0</span><span id="MerInevPer">0%</span></label>
                <label>GIO <span id="GioOrd">0</span><span id="GioEva">0</span><span id="GioInev">0</span><span id="GioInevPer">0%</span></label>
                <label>VEN <span id="VenOrd">0</span><span id="VenEva">0</span><span id="VenInev">0</span><span id="VenInevPer">0%</span></label>
                <label>SAB <span id="SabOrd">0</span><span id="SabEva">0</span><span id="SabInev">0</span><span id="SabInevPer">0%</span></label>
                <label>DOM <span id="DomOrd">0</span><span id="DomEva">0</span><span id="DomInev">0</span><span id="DomInevPer">0%</span></label>
            </div>
        </div>

        <div class="centrale-glass-box">
            <div class="input-group"><label>SELEZIONE DATA</label><input type="date" id="in_giorno"></div>
            <div class="input-group"><label>COLLI ORDINATI</label><input type="number" id="in_ordinati"></div>
            <div class="input-group"><label>COLLI EVASI</label><input type="number" id="in_evasi"></div>
            <div class="input-group"><label>INEVASO LOG.</label><input type="number" id="in_inevaso"></div>
            <button id="btnSalva" onclick="scriviDati()" style="width: 100%; height: 50px; background: #ffcc00; font-family: Impact; border: none; border-radius: 8px; cursor: pointer; color: #003087; font-size: 1.2rem;">SALVA NEL DATABASE</button>
        </div>

        <div class="riepilogo-glass-box">
            <canvas id="chartSettimanale"></canvas>
        </div>
    </div>

    <script>
        const webAppUrl = 'https://script.google.com/macros/s/AKfycbwI91Xm_XtjU-OqjFBJ3C9ZAi7M-wVN58fDzI4iHSwNmRaCjmDZilLD0UD8J-9gXdzm/exec';
        let mioGrafico = null;

        window.onload = function() {
            const nomeUtente = localStorage.getItem("utenteLoggato") || "Giacomo Bardelli";
            document.getElementById('userFullname').innerText = nomeUtente;
            document.getElementById('userInitials').innerText = "GB";
            caricaDatiSettimana();
        };

        async function scriviDati() {
            const btn = document.getElementById('btnSalva');
            const giorno = document.getElementById('in_giorno').value;
            const ordinati = document.getElementById('in_ordinati').value;
            const evasi = document.getElementById('in_evasi').value;
            const inevaso = document.getElementById('in_inevaso').value;

            if (!giorno || !ordinati || !evasi) {
                alert("Compila tutti i campi obbligatori!");
                return;
            }

            btn.innerText = "SALVATAGGIO...";
            btn.disabled = true;

            const payload = {
                giorno: giorno,
                ordinati: ordinati,
                evasi: evasi,
                inevaso: inevaso,
                azione: 'salvaInevasiFreschi'
            };

            try {
                await fetch(webAppUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                
            
                document.getElementById('in_ordinati').value = "";
                document.getElementById('in_evasi').value = "";
                document.getElementById('in_inevaso').value = "";
               
                caricaDatiSettimana();

            } catch (e) {
                alert("Errore durante il salvataggio.");
                console.error(e);
            } finally {
                btn.innerText = "SALVA NEL DATABASE";
                btn.disabled = false;
            }
        }

    -
        async function caricaDatiSettimana() {
            let btnAggiorna = (window.event && window.event.target && window.event.target.tagName === 'BUTTON') ? window.event.target : null;
            if (btnAggiorna) { btnAggiorna.innerText = "SYNC..."; btnAggiorna.disabled = true; }

            try {
                const response = await fetch(webAppUrl);
                const datiSettimana = await response.json();
                const mappa = { 1: "Lun", 2: "Mar", 3: "Mer", 4: "Gio", 5: "Ven", 6: "Sab", 0: "Dom" };

                for (let g in datiSettimana) {
                    let pref = mappa[g];
                    let info = datiSettimana[g];
                    if (pref) {
                        let o = parseFloat(info.ordinati) || 0;
                        let i = parseFloat(info.inevaso) || 0;
                        let p = o > 0 ? (i / o * 100).toFixed(2) : 0;

                        document.getElementById(pref + "Ord").innerText = o.toLocaleString('it-IT');
                        document.getElementById(pref + "Eva").innerText = (parseFloat(info.evasi) || 0).toLocaleString('it-IT');
                        document.getElementById(pref + "Inev").innerText = i.toLocaleString('it-IT');
                        let elP = document.getElementById(pref + "InevPer");
                        elP.innerText = p + "%";
                        elP.style.color = p > 5 ? "#ff4d4d" : "white";
                    }
                }
                disegnaGrafico(datiSettimana);
            } catch (e) { console.error("Errore caricamento:", e); }
            finally { if(btnAggiorna) { btnAggiorna.innerText = "AGGIORNA DATI"; btnAggiorna.disabled = false; } }
        }

        function disegnaGrafico(dati) {
            const ctx = document.getElementById('chartSettimanale').getContext('2d');
            if (mioGrafico) mioGrafico.destroy();

            const labels = ["Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato", "Domenica"];
            const ordine = [1, 2, 3, 4, 5, 6, 0];
            const datasetBar = ordine.map(g => dati[g]?.ordinati || 0);
            const datasetLine = ordine.map(g => {
                let o = dati[g]?.ordinati || 0;
                return o > 0 ? ((dati[g]?.inevaso || 0) / o * 100).toFixed(2) : 0;
            });

            mioGrafico = new Chart(ctx, {
                data: {
                    labels: labels,
                    datasets: [
                        { type: 'bar', label: 'Colli Ordinati', data: datasetBar, backgroundColor: 'rgba(255, 204, 0, 0.5)', yAxisID: 'y' },
                        { type: 'line', label: '% Inevaso', data: datasetLine, borderColor: '#ff4d4d', borderWidth: 3, yAxisID: 'y1', tension: 0.3 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: { position: 'left', ticks: { color: '#fff' }, grid: { color: 'rgba(255,255,255,0.1)' }, title: { display: true, text: 'Volume Colli', color: '#ffcc00' } },
                        y1: { position: 'right', ticks: { color: '#ff4d4d', callback: v => v + '%' }, grid: { display: false }, title: { display: true, text: '% Errore', color: '#ff4d4d' } },
                        x: { ticks: { color: '#fff', font: { family: 'Impact' } } }
                    },
                    plugins: { legend: { labels: { color: '#fff', font: { family: 'Impact' } } } }
                }
            });
        }

        function confermaEsci() { if(confirm("Sei sicuro di voler uscire?")) window.location.href="index.html"; }
    </script>
</body>
</html>
