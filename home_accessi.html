<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piattaforma Tigros - Home Qualità</title>
    <link rel="icon" type="image/png" href="images.png">
    <link rel="apple-touch-icon" href="images.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        /* --- STRUTTURA FONDAMENTALE --- */
        body {
            margin: 0;
            background: linear-gradient(135deg, #2b75ee 0%, #a0861d 100%) !important;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            height: auto; 
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            color: white;
        }

        /* --- NAVIGAZIONE --- */
        nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-left { flex: 0 0 auto; display: flex; justify-content: flex-start; }
        
        .user-badge {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255, 255, 255, 0.15);
            padding: 5px 12px; border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        .user-initials {
            width: 30px; height: 30px;
            background: #ffcc00; color: #003087;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 0.85rem; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .user-fullname { color: white; font-size: 0.85rem; text-transform: capitalize; }

        nav ul { 
            list-style: none; display: flex; gap: 20px; margin: 0 250px 0 0 ; padding: 0; 
            flex: 1; justify-content: center; text-align: center;
        }

        nav ul li a { 
            text-decoration: none; color: white; font-size: 1.15rem; 
            transition: all 0.4s ease; cursor: pointer; white-space: nowrap;
        }

        nav ul:hover li a { filter: blur(2px); opacity: 0.5; transform: scale(0.95); }
        nav ul li a:hover { filter: blur(0px); opacity: 1; transform: scale(1.15); color: #ffcc00; }
        .logout { color: #efba0a !important; }

        .nav-right { flex: 0 0 auto; display: flex; justify-content: flex-end; }
        .nav-logo img { height: 38px; width: auto; transition: 0.3s; cursor: pointer; }

        /* --- BENVENUTO --- */
        .welcome-section {
            display: none; position: absolute; top: 85%; left: 50%;
            transform: translate(-50%, -50%); flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            color: rgb(232, 155, 12); z-index: 10;
        }
        .mostra-benvenuto { display: flex !important; }
        .welcome-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            text-shadow: 0 10px 30px rgba(0,0,0,0.4);
            animation: welcomeSequence 3s ease-in-out forwards; opacity: 0;
        }

        /* --- CONTENITORE BOX (GLASS) --- */
        .container-glass {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: flex-start;
            gap: 40px;
            padding: 40px 20px;
            z-index: 50;
        }

        .glass-box-container {
            display: none; 
            perspective: 1000px;
        }

        .book-glass-box, .report-glass-box, .accessi-glass-box, .frutta-glass-box, .manutenzione-glass-box, .haccp-glass-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            text-align: center; width: 400px; height: 250px;
            max-width: 90vw;
            cursor: pointer; transition: all 0.4s ease;
            box-sizing: border-box;
            animation: apparizioneIniziale 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .glass-box-container:hover {
            box-shadow: #ffcc00 0px 0px 20px;
            border-radius: 20px;
            transform: translateY(-5px);
        }

        .book-title, .report-title, .accessi-title, .frutta-title, .manutenzione-title, .haccp-title {
            color: #ecb40c; font-size: 20px; margin-bottom: 20px; 
            font-weight: bold; letter-spacing: 1px;
        }

        .report_before, .frutta_before, .accessi_before, .manutenzione_before, .haccp_before {
            width: 130px; height: 130px; background: #efba0a;
            border-radius: 50%; margin: 0 auto;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            transition: width 1s ease; overflow: hidden;
        }

        .report_before span, .accessi_before span, .frutta_before span, .manutenzione_before span, .haccp_before span {
            color: #003087; font-size: 18px; font-weight: bold;
            padding: 0 10px;
        }

        /************************************** PARTE DEL CSS PER OTTIMIZZAZIONE TELEFONI ************************************************************/
        @media (max-width: 768px) {
            .user-fullname { display: none; }
            .user-badge { padding: 5px; background: transparent; border: none; }

            nav { padding: 5px 10px; gap: 5px; }
            nav ul {
                justify-content: flex-start;
                flex-wrap: nowrap;
                overflow-x: auto;
                padding: 10px 0;
                gap: 15px;
                scrollbar-width: none; 
            }
            nav ul::-webkit-scrollbar { display: none; }
            nav ul li a { font-size: 0.9rem; }

            .nav-logo img { height: 30px; }

            .container-glass { padding: 20px 10px; gap: 20px; }
            
            .report_before, .frutta_before, .accessi_before, .manutenzione_before, .haccp_before {
                width: 110px; height: 110px;
            }
        }

        /* --- ANIMAZIONI --- */
        @keyframes apparizioneIniziale {
            0% { opacity: 0; filter: blur(20px); transform: scale(0.85); }
            100% { opacity: 1; filter: blur(0px); transform: scale(1); }
        }

        @keyframes welcomeSequence {
            0% { opacity: 0; transform: translateY(30px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-15px); filter: blur(10px); }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <div class="user-badge" onclick="location.href='info_utente.html'">
                <div class="user-initials" id="userInitials">??</div>
                <span class="user-fullname" id="userFullname">Utente</span>
            </div>
        </div>
        <ul>
            <li><a href="Home_new.html" style="color: #ffcc00;">HOME</a></li>
            <li><a onclick="confermaEsci()" class="logout">ESCI</a></li>
        </ul>
        <div class="nav-right">
            <div class="nav-logo">
                <img src="LOGO_TIGROS_VERTICALE.jpg" alt="Logo Tigros">
            </div>
        </div>
    </nav>

   

    <div class="container-glass">
        
        <div class="glass-box-container" id="box-richiami">
            <div class="accessi-glass-box" onclick="window.location.href='accessi_live.html'">
                <h2 class="accessi-title">ACCESSI LIVE</h2>
                <div class="accessi">
                    <div class="accessi_before">
                        <span><i class="fa-solid fa-right-to-bracket" style="font-size: 60px;"></i></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-box-container" id="box-report">
            <div class="haccp-glass-box" onclick="window.location.href='accessi.html'">
                <h2 class="haccp-title">RIEPILOGO ACCESSI</h2>
                <div class="haccp">
                    <div class="haccp_before">
                        <span><i class="fa-solid fa-truck-front" style="font-size: 60px;"></i></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-box-container" id="box-check">
            <div class="manutenzione-glass-box" onclick="sviluppo()">
                <h2 class="manutenzione-title">NAVETTE</h2>
                <div class="manutenzione">
                    <div class="manutenzione_before">
                        <span><i class="fa-solid fa-arrow-trend-down" style="font-size: 60px;"></i></span>
                    </div>
                </div>
            </div>
        </div>


    </div>

    <script>
        const autorizzazioni = {
            "Admin": ["richiami", "report", "check", "laboratori","fornitori"],
            "Qualita.Pesce": ["richiami", "report"],
            "User.Ortofrutta": ["richiami"],
            "giacomo bardelli": ["richiami", "report", "check", "laboratori","fornitori"],
            "ermanno lamperti": ["richiami", "report", "check", "laboratori","fornitori"],
            "Ermanno Lamperti": ["richiami", "report", "check", "laboratori","fornitori"],
            "Ospite": ["richiami", "report", "check", "laboratori","fornitori"],
        };

        window.onload = function() {
            const comingFrom = document.referrer;
            const welcomeBox = document.getElementById('welcomeBox');
            if (comingFrom.includes("index")) {
                welcomeBox.classList.add('mostra-benvenuto');
                setTimeout(() => { welcomeBox.classList.remove('mostra-benvenuto'); }, 3000);
            }

            const nomeUtente = localStorage.getItem("utenteLoggato") || "Ospite";
            document.getElementById('userFullname').innerText = nomeUtente;
            
            const parti = nomeUtente.split(/[._ ]/); 
            let iniziali = (parti.length > 1) ? parti[0][0] + parti[1][0] : parti[0][0] + (parti[0][1] || "");
            document.getElementById('userInitials').innerText = iniziali.toUpperCase();

            const repartiConsentiti = autorizzazioni[nomeUtente] || ["richiami"]; 
            const tuttiIBox = [ "richiami", "report", "check", "laboratori","fornitori" ];

            tuttiIBox.forEach(reparto => {
                const boxWrapper = document.getElementById('box-' + reparto);
                if (boxWrapper) {
                    if (repartiConsentiti.includes(reparto)) {
                        boxWrapper.style.display = 'block'; 
                    } else {
                        boxWrapper.remove(); 
                    }
                }
            });
        };

        function sviluppo(){ alert("Sezione non disponibile.\nIn fase di sviluppo."); }

        function confermaEsci() {
            if (confirm("Sei sicuro di voler uscire dalla Piattaforma Tigros?")) {
                localStorage.removeItem("utenteLoggato");
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
