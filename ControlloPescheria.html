<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tigros - Dashboard Qualità Pescheria</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        body { 
            margin: 0; 
            background: linear-gradient(135deg, #2b75ee 0%, #a0861d 100%); 
            font-family: 'Montserrat', sans-serif; 
            color: white; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        nav { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px); 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.2); 
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
        }

        .btn-nav {
            border: none;
            padding: 8px 30px;
            border-radius: 5px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 200;
            cursor: pointer;
            transition: 0.3s;
            width: 220px;
            height: auto;
            text-align: center;
            font-size: 15px;
        }

        .btn-pdf { background: #ffffff; color: #003087; }
        .btn-home { background: #ffcc00; color: #003087; }
        .btn-nav:hover { transform: scale(1.05); filter: brightness(1.1); }

        .filter-bar { background: rgba(255, 255, 255, 0.05); padding: 15px 15px; display: flex; gap: 20px; align-items: center; }
        
        select { 
            background: rgba(0, 48, 135, 0.8); 
            color: white; 
            border: 1px solid #ffcc00; 
            padding: 8px 15px; 
            border-radius: 5px; 
            font-family: 'Montserrat', sans-serif; 
            cursor: pointer; 
        }
        
        .container { display: grid; grid-template-columns: 400px 1fr; gap: 20px; padding: 20px; flex-grow: 1; overflow: hidden;}

        .sidebar { overflow-y: auto; padding-right: 10px; font-family: 'Montserrat', sans-serif; }
        
        .card, .chart-container { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); 
            border-radius: 20px; 
            padding: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            font-family: 'Montserrat', sans-serif;

        }

        .boxInfo { display: flex; gap: 15px; margin-left: auto; font-size: 15px;}
        
            .chart-container { 
            display: flex; 
            flex-direction: column; 
            gap: 30px; 
            overflow-y: auto;
        }

        .chart-container::-webkit-scrollbar {
            width: 10px;               
            height: 10px;             
        }

        .chart-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .chart-container::-webkit-scrollbar-thumb {
            background: #ffcc00;      
            border-radius: 10px;       
            border: 2px solid rgba(0, 48, 135, 0.5); 
        }

        .chart-container::-webkit-scrollbar-thumb:hover {
            background: #ffdb4d;     
        }




        .container-2 { display: flex; flex-direction: column; gap: 30px; overflow-y: auto;}

        .testoRiepilogo { 
            margin-left:auto; 
            font-weight: bold; 
            color:#ffcc00; 
            font-family: 'Montserrat', sans-serif;
            font-size:25px;
            background-color: #322e9f;
            border-color: #322e9f; 
            border: 6px solid #322e9f; 
            border-radius: 15px; padding: 5px;
        }

        .percentualeNC { 
            margin-left:auto; 
            font-weight: bold; 
            color:#322e9f; 
            font-family: 'Montserrat', sans-serif;
            font-size:20px;
            background-color: #ffcc00;
            border-color: #ffcc00; 
            border: 6px solid #ffcc00; 
            border-radius: 15px; padding: 5px;
        }
        
        h2 { 
            font-family: Impact; 
            color: #ffcc00; 
            margin: 0; 
            text-transform: uppercase; 
            border-bottom: 2px solid #ffcc00; 
            font-size: 1.2rem; 
            padding-bottom: 5px; 
        }
        
        .month-row { display: grid; grid-template-columns: 100px 1fr 65px; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        
        .stat-ok { color: #322e9f; font-weight: bold; font-family: 'Montserrat', sans-serif;font-size: 20px; font-weight: bold;  } 
        .stat-no { color: #f58585; font-weight: bold; font-family: 'Montserrat', sans-serif;font-size: 20px; font-weight: bold;  }
        .month-incid { text-align: right; font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: bold; color: #ffcc00; background-color: #322e9f; border-radius: 15px; text-align: center; }
        
        .canvas-wrapper { position: relative; min-height: 400px; width: 100%; }
        .pie-wrapper { position: relative; min-height: 350px; width: 100%; margin-top: 10px; border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 20px; height: auto;}
        
        #loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 48, 135, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        
        
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255, 255, 255, 0.3); border-top-color: #ffcc00; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }


        .gruppo-btn {
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-radius: 20px;
            align-items: center;
            width: 390px;
            text-align: center;
            bottom: 100px;
        }

        .btn-report {
            display: flexbox;
            bottom: 35px;
            left: 20px;
            width: 350px;
            background: #ffcc00;
            color: #003087;
            border: none;
            padding: 15px 40px;
            border-radius: 5px;
            font-family: 'Montserrat', sans-serif;
            font-weight: bold; 
            font-size: auto;
            
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s, filter 0.3s;
        }

        .btn-report:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }
        
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: #ffcc00; border-radius: 10px; }
    </style>
</head>
<body>

    


    <div id="loader-overlay">
        <div class="spinner"></div>
        <p id="loader-text" style="font-family: 'Montserrat', sans-serif; font-size: 20px; color: #ffcc00; margin-top:10px;">Caricamento dati dal Database controllo Qualità Pescheria...</p>
    </div>

    <nav>
        <div style="font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: bold; color: #ffcc00;">
            TIGROS PIATTAFORMA LOGISTICA - ANDAMENTO CONTROLLO QUALITA' PESCHERIA
        </div>
        <div class="nav-buttons">
            <button onclick="esportaPDF()" class="btn-nav btn-pdf">ESPORTA PDF</button>
            <button onclick="location.href='Home_new.html'" class="btn-nav btn-home">HOME</button>
        </div>
    </nav>

    <div class="filter-bar">
        <span style="font-family: 'Montserrat', sans-serif; font-size: 15px; background-color: #ffcc00; color: #322e9f;border-color: #ffcc00; border: 6px solid #ffcc00; border-radius: 15px; padding: 5px; font-weight: bold;">Anno:</span>
        <select id="selectAnno" onchange="processaDati()" style="font-family: 'Montserrat', sans-serif; font-size: 15px;">
            <option value="2024">2024</option>
            <option value="2025">2025</option>
            <option value="2026" selected>2026</option>
        </select>
             <span id="elencoMesi" style="display: none; font-family: 'Montserrat', sans-serif; font-size: 15px; font-weight: bold; background-color: #ffcc00; color: #322e9f;border-color: #ffcc00; border: 6px solid #ffcc00; border-radius: 15px; padding: 5px;">Mese:</span>
        <select id="selectMese" onchange="" style="display: none; font-family: 'Montserrat', sans-serif; font-size: 15px;">
            <option value="1">Gennaio</option>
            <option value="2">Febbraio</option>
            <option value="3">Marzo</option>
            <option value="4">Aprile</option>
            <option value="5">Maggio</option>
            <option value="6">Giugno</option>
            <option value="7">Luglio</option>
            <option value="8">Agosto</option>
            <option value="9">Settembre</option>
            <option value="10">Ottobre</option>
            <option value="11">Novembre</option>
            <option value="12">Dicembre</option>
        </select>
        <div class="boxInfo">
            <span class="testoRiepilogo" id="descrizioneAnno">Riepilogo Anno selezionato: </span>    
            <span class="percentualeNC" id="counter-display"></span>
            <span class="percentualeNC" id="counter-displayC"></span>
            <span class="percentualeNC" id="counter-displayNC"></span>
            <span class="percentualeNC" id="counter-display%NC"></span>
        </div>

    </div>

    <div class="container">
   
        <div class="sidebar"><div class="card"><h2 style="font-family: 'Montserrat', sans-serif; font-weight: bold; text-align: center;">REPORT MENSILE</h2><div id="listaMesi"></div></div></div>

        <div class="chart-container" id="chart-container">
            <h2 style="font-family: 'Montserrat', sans-serif;">ANDAMENTO CONTROLLI ANNUALI</h2>
            <div class="canvas-wrapper">
                <canvas id="annualChart"></canvas>
            </div>
            
            <div class="pie-wrapper">
                <h2 id="titoloTorta" style="font-family: 'Montserrat', sans-serif; font-weight: bold;">DETTAGLIO CAUSALI NON CONFORMITÀ</h2>
                <canvas id="pieChart"></canvas>
            </div>
        </div>

    <div class="container-2" id="container-2" style="display:none;">
        <div class="card"><h2>REPORT 2</h2>
            <div id="report2Content">
                Contenuto Report 2...
        </div>
    </div>
    

    </div>
    <div class="gruppo-btn" style="position: fixed; bottom: 20px; left: 20px; font-family: 'Montserrat', sans-serif;">
        <button class="btn-report" id="exportBtn" onclick="controlliCausaliNC()">CONTROLLI MENSILI & CAUSALI</button>
        <button class="btn-report" id="exportBtn" onclick="analisiNC()">ANALISI NON CONFORMITÀ</button>
        <button class="btn-report" id="exportBtn" onclick="">Report_3</button>
        <button class="btn-report" id="exportBtn" onclick="">Report_4</button>
        <button class="btn-report" id="exportBtn" onclick="">Report_5</button>
    </div>

    <script>
        Chart.register(ChartDataLabels);

        let datiOriginali = [];
        let mioGrafico, mioPie;
        const nomiMesi = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSEU_jF9mbvM3Md2lTz9A67HYiYFWkmoVV9oTKPRWweb_-DaVWg_yEFEyYXj2l2w9s0LT2i54OZq3AA/pub?gid=0&single=true&output=csv'; 

        async function caricaDati() {

            try {
                const response = await fetch(sheetUrl + '&t=' + new Date().getTime());
                const rawData = await response.text();
                const lines = rawData.split(/\r?\n/).filter(l => l.trim().length > 10);
                
                datiOriginali = lines.slice(1).map(line => {
                    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        esito: cols[72] ? cols[72].replace(/"/g, "").trim().toLowerCase() : "",
                        mese: cols[79] ? cols[79].replace(/"/g, "").trim() : "",
                        anno: cols[80] ? cols[80].replace(/"/g, "").trim() : "",
                        corpo: cols[69] ? cols[69].replace(/"/g, "").trim() : "",
                        paras: cols[56] ? cols[56].replace(/"/g, "").trim() : "",
                        etich: cols[15] ? cols[15].replace(/"/g, "").trim() : "",
                        conf: cols[12] ? cols[12].replace(/"/g, "").trim() : ""
                    };
                });
                processaDati();
                document.getElementById('loader-overlay').style.display = 'none';
            } catch (e) { console.error(e); }
        }

        function processaDati() {

           

            const annoScelto = document.getElementById('selectAnno').value;
            document.getElementById('titoloTorta').innerText = "DETTAGLIO CAUSALI NON CONFORMITÀ ANNO " + annoScelto;

            document.getElementById('descrizioneAnno').innerText = "Riepilogo Anno " + annoScelto + ": ";

            let mensili = Array.from({ length: 12 }, (_, i) => ({ nome: nomiMesi[i], ok: 0, no: 0, tot: 0 }));
            let causaliCount = { "Corpo Estraneo": 0, "Parassiti": 0, "Etichettatura/Conf.": 0, "Qualità Prodotto": 0 };
            let validi = 0;
            let conteggioNC = 0;

            datiOriginali.forEach(r => {
                const cleanAnno = r.anno.replace(/\D/g, "");
                const cleanMese = parseInt(r.mese.replace(/\D/g, ""), 10);

                console.log(`Anno Pulito: ${cleanAnno}`);
                console.log(`Mese Pulito: ${cleanMese}`);

                if (cleanAnno === annoScelto && !isNaN(cleanMese)) {
                    const idx = cleanMese - 1;
                    if (idx >= 0 && idx < 12) {
                        mensili[idx].tot++;
                        validi++;
                        
                        if (r.esito.includes("neg") || r.esito.includes("non") || r.esito === "no") {
                            mensili[idx].no++;
                            if (r.corpo === 'Non conforme') causaliCount["Corpo Estraneo"]++;
                            else if (r.paras === 'Non conforme') causaliCount["Parassiti"]++;
                            else if (r.etich === 'Non conforme' || r.conf === 'Non conforme') causaliCount["Etichettatura/Conf."]++;
                            else causaliCount["Qualità Prodotto"]++;
                            conteggioNC++;
                        } else {
                            mensili[idx].ok++;
                        }
                    }
                }
            });

            const causaliFiltrate = {};
            for (const key in causaliCount) { if (causaliCount[key] > 0) causaliFiltrate[key] = causaliCount[key]; }

                let conteggioC = 0;
                
                let controlliConformi = validi - conteggioNC;
                let percentualeNC = validi > 0 ? ((conteggioNC / validi) * 100).toFixed(1) : 0;

            document.getElementById('counter-display').innerText = "CONTROLLI: " + validi;
            document.getElementById('counter-displayC').innerText = "CONFORMI: " + controlliConformi;
            document.getElementById('counter-displayNC').innerText = "NON CONF: " + conteggioNC;
            document.getElementById('counter-display%NC').innerText = "PERCENTUALE NON CONF: " + percentualeNC + "%";

            aggiornaUI(mensili, causaliFiltrate);
        }

        function aggiornaUI(dati, causali) {
            const listaDiv = document.getElementById('listaMesi');
            listaDiv.innerHTML = '';
            dati.forEach(d => {
                const incid = d.tot > 0 ? ((d.no / d.tot) * 100).toFixed(1) : 0;
                listaDiv.innerHTML += `
                    <div class="month-row">
                        <span style="font-family: 'Montserrat', sans-serif; font-weight: bold;">${d.nome}</span>
                        <div class="month-stats"><span class="stat-ok">OK: ${d.ok}</span> - <span class="stat-no">NO: ${d.no}</span></div>
                        <span class="month-incid">${incid}%</span>
                    </div>`;
            });

            
            const ctxBar = document.getElementById('annualChart').getContext('2d');
            if (mioGrafico) mioGrafico.destroy();
            mioGrafico = new Chart(ctxBar, {
                data: {
                    labels: dati.map(d => d.nome),
                    datasets: [
                        { type: 'line', label: 'Incidenza NC %', data: dati.map(d => d.tot > 0 ? (d.no/d.tot*100).toFixed(1) : 0), borderColor: 'white', borderWidth: 3, pointRadius: null, yAxisID: 'y1', datalabels: { display: true, align:'top', color:'white', font:{weight:'bold', size:20}, formatter: (v) => v > 0 ? v + '%' : '' }},
                        { type: 'bar', label: 'Totale Controlli', data: dati.map(d => d.tot), backgroundColor: 'rgba(255, 204, 0, 0.7)', datalabels: { display: true, anchor:'start', align:'top', font:{weight:'200', size:20}, color:'#003087' }}
                    ]
                },
                options: { 
                    animation: { duration: 2000, easing: 'easeInOutSine', delay: (c) => c.dataIndex * 250 },
                    responsive: true, maintainAspectRatio: false, 
                    scales: {x: {ticks: { color: 'white',font: {  family:'Montserrat, sans-serif', size: 15}}}, y: { ticks: { color: 'white' } }, y1: { position: 'right', beginAtZero: true, ticks: { color: 'white', callback: v => v + '%' }, grid: { drawOnChartArea: false } } },
                    plugins: { legend: { labels: { color: 'white', font: { family:'Montserrat, sans-serif', size: 15 } } } }
                }
            });

           
            const ctxPie = document.getElementById('pieChart').getContext('2d');
            if (mioPie) mioPie.destroy();
            mioPie = new Chart(ctxPie, {
                type: 'pie',
                data: {
                    labels: Object.keys(causali),
                    datasets: [{
                        data: Object.values(causali),
                        backgroundColor: ['#ffcc00', '#ff4d4d', '#4eff4e', '#2b75ee', '#a0861d', '#ffffff'],
                        borderWidth: 0, hoverOffset: 25
     
                    }]
                },
                options: { 
                    animation: {
                        animateRotate: true,
                        animateScale: true,
                        duration: 2000,
                        easing: 'easeOutcubic'
                    },
                    responsive: true, maintainAspectRatio: false,
                    plugins: { 
                        legend: { position: 'right', labels: { color: 'white', font: { family:'Montserrat, sans-serif', size: 20 } } },
                        datalabels: {
                            color: 'black', font: { weight: 'bold', size: 20 }, anchor:'middle',
                            formatter: (val, ctx) => {
                                let sum = 0;
                                ctx.chart.data.datasets[0].data.forEach(d => sum += d);
                                return (val*100/sum).toFixed(1) + "%";
                            }
                        }
                    }
                }
            });
        }

        async function esportaPDF() {
            const { jsPDF } = window.jspdf;
            const loader = document.getElementById('loader-overlay');
            loader.style.display = 'flex';
            document.getElementById('loader-text').innerText = "GENERAZIONE PDF...";

            try {
                const canvas = await html2canvas(document.body, {
                    scale: 2, useCORS: true,
                    ignoreElements: (el) => el.tagName === 'BUTTON' || el.id === 'loader-overlay'
                });
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF('l', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                pdf.save(`Report_Pescheria_${document.getElementById('selectAnno').value}.pdf`);
            } catch (e) { console.error(e); }
            loader.style.display = 'none';
        }

        caricaDati();

            function analisiNC(){

                document.getElementById('chart-container').style.display = 'none';
                document.getElementById('container-2').style.display = 'flex';
                document.getElementById('selectMese').style.display = 'flex';
                document.getElementById('elencoMesi').style.display = 'flex';
                
            }

            function controlliCausaliNC(){
                document.getElementById('chart-container').style.display = 'flex';
                document.getElementById('container-2').style.display = 'none';
                document.getElementById('selectMese').style.display = 'none';
                document.getElementById('elencoMesi').style.display = 'none';
                
            }


    </script>
</body>
</html>
