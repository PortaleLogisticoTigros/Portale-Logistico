<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piattaforma Tigros - Viaggi</title>
    <style>

         @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        body {
            margin: 0;
            background: linear-gradient(135deg, #2b75ee 0%, #a0861d 100%);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 10;
        }

        .nav-left {
            flex: 1;
            display: flex;
            justify-content: flex-start;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.15);
            padding: 5px 12px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .user-initials {
            width: 30px;
            height: 30px;
            background: #ffcc00;
            color: #003087;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .user-fullname {
            color: white;
            font-size: 0.85rem;
            text-transform: capitalize;
        }

         nav ul { 
            list-style: none; 
            display: flex; 
            gap: 20px; 
            margin: 0; 
            padding: 0; 
            flex: 1; 
            justify-content: center; 
            text-align: center;
        }

        li a {
            text-decoration: none; 
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            font-size: 1.15rem; 
            transition: all 0.4s ease; 
            cursor: pointer;
            white-space: nowrap;
        }

        .nav-right {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }

        .nav-logo img {
            height: 38px;
            width: auto;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
        }

        ul:hover li a { filter: blur(3px); opacity: 0.5; transform: scale(0.9); }
        ul li a:hover { filter: blur(0px); opacity: 1; transform: scale(1.2); color: #ffcc00; }
        li a.logout { color: #efba0a; }
        li a.logout:hover { color: #ff0000; text-shadow: 0 0 15px rgba(255, 0, 0, 0.6); }

        .container-main {
            display: flex;
            flex-direction: row;
            padding: 40px;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            height: 100%;
            box-sizing: border-box;
        }

         .container-iniziali {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            text-align: center; 
            width: 400px; 
            height: 400px;
            max-width: 90vw;
            box-sizing: border-box;
            display: flex; align-items: center; justify-content: center;
            animation: apparizioneIniziale 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        .iniziali {
            font-size: 120px; 
            font-weight: 900; 
            background-color: #ffcc00; 
            color: #003087; 
            border-radius: 50%; 
            width: 250px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .container-info{
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 30px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            width: 600px; 
            height: 400px;
            max-width: 90vw;
            margin-left: 40px;
            box-sizing: border-box;
            animation: apparizioneIniziale 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .container-info h4 {
            color: #ffcc00;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background-color: #003087;
            padding: 10px 20px;
            border-radius: 15px;
            width: fit-content;
            margin: -50px 0 20px 0; /* Lo tira un po' su rispetto al bordo */
            text-align: left;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .elenco-info p {
            color:#ffcc00;
            font-family: 'Montserrat', sans-serif;
            font-size: 22px;
            padding: 12px 10px;
            margin: 0;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .elenco-info p:last-child {
            border-bottom: none;
        }

        .elenco-info span{
            margin-left: 20px;
            color: white;
            font-weight: 600;
        }

        #infoEmail {
            font-size: 20px;
        }

        @keyframes apparizioneIniziale {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Stile per l'icona occhio */
        .toggle-password {
            margin-left: auto !important; /* Spinge l'occhio tutto a destra */
            cursor: pointer;
            font-size: 22px !important;
            filter: grayscale(1); 
            transition: 0.2s;
            user-select: none;
        }
        
        .toggle-password:hover {
            filter: grayscale(0);
            transform: scale(1.2);
        }

        /* ------------------------------------------------------------------ */
        /* MEDIA QUERIES SOLO PER MOBILE (Fino a 768px)                       */
        /* ------------------------------------------------------------------ */
        @media (max-width: 768px) {
            body { 
                overflow-y: auto !important; 
                height: auto !important; 
                min-height: 100vh; 
            }

            /* Navigazione su una riga scorrevole */
            nav {
                flex-wrap: wrap;
                padding: 10px;
                gap: 10px;
                justify-content: space-between;
            }
            .user-fullname { display: none; }
            .nav-left { flex: 0 0 auto; }
            .nav-right { flex: 0 0 auto; }
            
            nav ul {
                justify-content: flex-start;
                flex-wrap: nowrap;
                overflow-x: auto;
                width: 100%;
                padding: 10px 0;
                gap: 15px;
                scrollbar-width: none; 
            }
            nav ul::-webkit-scrollbar { display: none; }
            nav ul li a { font-size: 0.9rem; }

            .nav-logo img { height: 30px; }

            /* Contenitore Principale Incolonnato */
            .container-main {
                flex-direction: column;
                padding: 20px 10px;
                gap: 30px;
                height: auto;
                overflow-y: visible;
            }

            /* Aggiustamento Box */
            .container-iniziali, .container-info {
                width: 100%;
                max-width: 100%;
                margin-left: 0;
                height: auto;
            }

            .container-iniziali {
                padding: 40px 20px;
            }

            .iniziali {
                width: 150px;
                height: 150px;
                font-size: 60px;
            }

            .container-info {
                padding: 20px 15px;
            }

            .container-info h4 {
                font-size: 1.2rem;
                margin: -35px auto 20px auto; /* Centra il titolo in alto */
            }

            .elenco-info {
                padding: 0 !important;
            }

            /* Testi su due righe per non uscire dal box */
            .elenco-info p {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
                font-size: 16px;
                padding: 15px 10px;
                background: rgba(0,0,0,0.1);
                border-bottom: none;
                border-radius: 10px;
                margin-bottom: 10px;
            }

            .elenco-info span {
                margin-left: 0;
                font-size: 18px !important;
                word-break: break-all; /* Impedisce alle email lunghe di rompere lo schermo */
            }

            /* La riga della password ha bisogno di un layout specifico per l'occhio */
            .elenco-info p:last-child {
                flex-direction: row;
                flex-wrap: wrap;
                align-items: center;
            }
            .elenco-info p:last-child strong {
                width: 100%;
                margin-bottom: 5px;
            }
        }

    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <div class="user-badge">
                <div class="user-initials" id="userInitials">??</div>
                <span class="user-fullname" id="userFullname">Utente</span>
            </div>
        </div>

        <ul>
            <li><a href="Home_new.html">HOME</a></li>
            <li><a href="Viaggi.html" style="color: #ffcc00;">DASHBOARD VIAGGI</a></li>
            <li><a href="Ordini.html">DASHBOARD ORDINI</a></li>
            <li><a href="Ricevimenti.html">DASHBOARD RICEVIMENTI</a></li>
            <li><a onclick="confermaEsci()" class="logout">ESCI</a></li>
        </ul>

        <div class="nav-right">
            <div class="nav-logo">
                <img src="LOGO_TIGROS_VERTICALE.jpg" alt="Logo Tigros">
            </div>
        </div>
    </nav>

    <div class="container-main">
        <div class="container-iniziali">
            <h1 class="iniziali" id="iniziali">??</h1>
        </div>
        <div class="container-info">
            <h4>Informazioni Utente</h4>
            <div class="elenco-info">
                <p><strong>Nome:</strong> <span id="infoNomeCompleto">Nome</span></p>
                <p><strong>Cognome:</strong> <span id="infoCognome">Cognome</span></p>
                <p><strong>Email:</strong> <span id="infoEmail">email@example.com</span></p>
                <p>
                    <strong>Password:</strong> 
                    <span id="infoPassword">••••••••</span> 
                    <span class="toggle-password" id="togglePasswordBtn" onclick="togglePassword()">👁️</span>
                </p>
            </div>
        </div>
    </div>
    
    <script>
        
        let passwordReale = "";

        window.onload = function() {
            const nomeUtente = localStorage.getItem("utenteLoggato") || "Ospite";
            document.getElementById('userFullname').innerText = nomeUtente;
            
            const parti = nomeUtente.split(/[._ ]/); 
            let iniziali = "";
            if (parti.length > 1) {
                iniziali = parti[0][0] + (parti[1][0] || "");
            } else {
                iniziali = parti[0][0] + (parti[0][1] || "");
            }
            
            document.getElementById('userInitials').innerText = iniziali.toUpperCase();
            document.getElementById('iniziali').innerText = iniziali.toUpperCase();
            
            document.getElementById('infoNomeCompleto').innerText = (parti[0] || "").toUpperCase();
            document.getElementById('infoCognome').innerText = (parti[1] || "").toUpperCase();
            
            document.getElementById('infoEmail').innerText = localStorage.getItem("emailUtente") || "Email non disponibile";

            passwordReale = localStorage.getItem("passwordUtente") || "NessunaPasswordSalvata";
            
            document.getElementById('infoPassword').innerText = "••••••••";
        };

        function togglePassword() {
            const pwdSpan = document.getElementById('infoPassword');
            
            if (pwdSpan.innerText === "••••••••") {
                pwdSpan.innerText = passwordReale;
            } else {
                pwdSpan.innerText = "••••••••";
            }
        }

        function confermaEsci() {
            if (confirm("Sei sicuro di voler uscire dalla Piattaforma Tigros?")) {
                localStorage.removeItem("utenteLoggato");
                localStorage.removeItem("passwordUtente"); 
                localStorage.removeItem("emailUtente");
                window.location.href = "index.html";
            }
        }

        function tornaHome(){
            window.location.href = "Home.html";
        }
    </script>

</body>
</html>
