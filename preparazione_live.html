<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piattaforma Tigros - Preparazione Merci</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        body {
            margin: 0;
            background: linear-gradient(135deg, #2b75ee 0%, #a0861d 100%);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- NAVIGATION AGGIORNATA --- */
        nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
        }

        .nav-left { display: flex; align-items: center; gap: 10px; }
        
        .user-badge {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255, 255, 255, 0.15);
            padding: 5px 12px; border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .user-initials {
            width: 30px; height: 30px; background: #ffcc00; color: #003087;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 0.85rem;
        }

        .user-fullname { color: white; font-size: 0.85rem; font-weight: 600; text-transform: capitalize; }

        nav ul { list-style: none; display: flex; gap: 12px; margin: 0; padding: 0; }
        nav ul li a { text-decoration: none; color: white; font-size: 0.85rem; font-weight: 700; }

        .nav-right { display: flex; align-items: center; gap: 10px; }
        .btn-refresh { background: #ffcc00; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .nav-logo img { height: 32px; width: auto; }

        /* --- CONTAINER --- */
        .container-main { flex: 1; padding: 15px; display: flex; justify-content: center; overflow-y: auto; }
        .container-dashboard {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            padding: 20px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%; max-width: 1400px; height: fit-content; margin-top: 20px;
        }

        .container-dashboard h4 {
            color: #ffcc00; background: #003087; padding: 10px 20px;
            border-radius: 12px; width: fit-content; margin: -40px auto 20px;
            font-size: 1rem; text-align: center;
        }

        /* --- TABELLA --- */
        table { width: 100%; border-collapse: collapse; color: white; }
        th { background: rgba(0, 48, 135, 0.8); color: #ffcc00; padding: 12px; font-size: 0.8rem; text-transform: uppercase; border-bottom: 2px solid #ffcc00; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; font-size: 0.95rem; }
        td:nth-child(2) { text-align: left; color: #ffcc00; font-weight: 700; }

        /* --- PROGRESS BAR --- */
        .progress-bg { background: rgba(255,255,255,0.15); border-radius: 15px; height: 22px; width: 100%; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        .progress-fill { background: linear-gradient(90deg, #ffcc00, #ff9900); height: 100%; transition: width 1s ease; position: absolute; left: 0; z-index: 1; }
        .progress-text { position: absolute; width: 100%; text-align: center; z-index: 2; color: #003087; font-weight: 900; font-size: 0.75rem; line-height: 22px; }
        .riga-totale { background: rgba(0, 48, 135, 0.6); font-weight: 900; border-top: 2px solid #ffcc00; }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 850px) {
            nav { flex-wrap: wrap; justify-content: space-between; }
            .nav-left { order: 1; }
            .nav-right { order: 2; }
            .nav-center { order: 3; width: 100%; margin-top: 10px; display: flex; justify-content: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
            .user-fullname { display: none; } /* Solo iniziali su mobile */
            
            thead { display: none; }
            tr { display: flex; flex-direction: column; background: rgba(255, 255, 255, 0.05); margin-bottom: 15px; padding: 15px; border-radius: 15px; }
            td { display: flex; justify-content: space-between; border: none; padding: 8px 0; }
            td:nth-child(1)::before { content: "CEDI:"; color: rgba(255,255,255,0.5); }
            td:nth-child(3)::before { content: "ORDINATI:"; }
            td:nth-child(4)::before { content: "PREPARATI:"; }
            td:nth-child(5)::before { content: "RIMASTI:"; }
            td:nth-child(6) { flex-direction: column; align-items: center; padding-top: 10px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <div class="user-badge">
                <div class="user-initials" id="userInitials">??</div>
                <span class="user-fullname" id="userFullname">Utente</span>
            </div>
        </div>

        <div class="nav-center">
            <ul>
                <li><a href="Home_new.html">HOME</a></li>
                <li><a href="Viaggi.html">VIAGGI</a></li>
                <li><a href="Ordini.html">ORDINI</a></li>
                <li><a onclick="confermaEsci()" style="color:#ff4444; cursor:pointer">ESCI</a></li>
            </ul>
        </div>

        <div class="nav-right">
            <button class="btn-refresh" onclick="caricaDati()">
                <svg viewBox="0 0 24 24" style="width:18px; fill:#003087;"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            </button>
            <div class="nav-logo"><img src="LOGO_TIGROS_VERTICALE.jpg" alt="Tigros"></div>
        </div>
    </nav>

    <div class="container-main">
        <div class="container-dashboard">
            <h4>PREPARAZIONE MERCI CASSANO</h4>
            <div id="loader" style="text-align:center; color:#ffcc00;">Caricamento dati...</div>
            <table id="tabella-merce" style="display:none;">
                <thead>
                    <tr>
                        <th>CEDI</th>
                        <th>MAGAZZINO</th>
                        <th>ORDINATI</th>
                        <th>PREPARATI</th>
                        <th>RIMASTI</th>
                        <th style="width:180px;">PROGRESSO</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabella-merce"></tbody>
            </table>
            <div id="ultimo-aggiornamento" style="font-size:0.7rem; color:white; text-align:right; margin-top:10px;"></div>
        </div>
    </div>

    <script>
        const linkCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ1HEv87Esyv53CeLeDtM5sI0FGXvbjWtDsA1_GY3gin3GBMBQ7SdS31rR8C1l2o0eUGwjIQYrvJxuW/pub?output=csv';

        // Pulizia numeri estrema
        function pulisciNumero(v) {
            if (!v) return 0;
            // Rimuove tutto ciò che non è numero
            let p = v.toString().replace(/[^0-9]/g, '');
            return parseInt(p) || 0;
        }

        async function caricaDati() {
            try {
                // ANTI-CACHE: aggiunge un timestamp per forzare il download di un file nuovo
                const response = await fetch(`${linkCSV}&nocache=${new Date().getTime()}`);
                const dataText = await response.text();
                
                const righeRaw = dataText.split('\n').filter(r => r.trim() !== '');
                const sep = righeRaw[0].includes(';') ? ';' : ',';
                const headers = righeRaw[0].split(sep).map(h => h.trim().toUpperCase());

                const idx = {
                    cedi: headers.indexOf("CEDI"),
                    desc: headers.indexOf("DESCRIZIONE_CEDI"),
                    area: headers.indexOf("AREA_PREPARAZIONE"),
                    ord: headers.indexOf("COLLI_ORD"),
                    prep: headers.indexOf("COLLI_PREPARATI"),
                    rim: headers.indexOf("COLLI_DA_PREPARARE")
                };

                const tbody = document.getElementById('corpo-tabella-merce');
                tbody.innerHTML = ''; // SVUOTA SEMPRE PRIMA DI SCRIVERE

                for (let i = 1; i < righeRaw.length; i++) {
                    const col = righeRaw[i].split(sep).map(c => c.replace(/"/g, '').trim());
                    let nomeMag = "";
                    let isTot = false;

                    // Mappatura nomi (tua logica precedente)
                    if (col[idx.cedi] === "21" && col[idx.area] === "VENTILA") nomeMag = "Freschi - Ventilazione";
                    else if (col[idx.cedi] === "21" && col[idx.area] === "PICKING") nomeMag = "Freschi - PICKING";
                    else if (col[idx.cedi] === "23" && col[idx.area] === "FRUTTA") nomeMag = "Ortofrutta - Frutta";
                    else if (col[idx.cedi] === "23" && col[idx.area] === "4 GAMMA") nomeMag = "Ortofrutta - IV Gamma";
                    else if (col[idx.cedi] === "24" && col[idx.area] === "VENTILA") nomeMag = "Cameri - Ventilazione";
                    else if (col[idx.cedi] === "24" && col[idx.area] === "CASS PICK") nomeMag = "Cameri - Picking";
                    else if (col[idx.cedi] === "24" && col[idx.area] === "EXPO PICK") nomeMag = "Cameri - Expo";
                    else if (col[idx.cedi] === "25" && col[idx.area] === "PICKING") nomeMag = "Cameri - Consumo interno";
                    else if (col[idx.cedi] === "35" && col[idx.area] === "CASS PICK") nomeMag = "Cassano - Omogenei";
                    else if (col[idx.cedi] === "28" && col[idx.area] === "VENTILA") nomeMag = "Macelleria - Ventilazione";
                    else if (col[idx.cedi] === "29" && col[idx.area] === "VENTILA") nomeMag = "Pescheria - Ventilazione";
                    else if (col[idx.cedi] === "" && col[idx.desc] === "TOTALE") { nomeMag = "TOTALE PIATTAFORMA"; isTot = true; }
                    else continue;

                    let o = pulisciNumero(col[idx.ord]);
                    let p = pulisciNumero(col[idx.prep]);
                    let r = pulisciNumero(col[idx.rim]);
                    let perc = o > 0 ? Math.min(100, Math.round((p/o)*100)) : 0;

                    const tr = document.createElement('tr');
                    if(isTot) tr.className = "riga-totale";
                    tr.innerHTML = `
                        <td>${col[idx.cedi]}</td>
                        <td>${nomeMag}</td>
                        <td>${o.toLocaleString('it-IT')}</td>
                        <td>${p.toLocaleString('it-IT')}</td>
                        <td>${r.toLocaleString('it-IT')}</td>
                        <td>
                            <div class="progress-bg">
                                <div class="progress-fill" style="width:${perc}%"></div>
                                <div class="progress-text">${perc}%</div>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                }

                document.getElementById('loader').style.display = 'none';
                document.getElementById('tabella-merce').style.display = 'table';
                document.getElementById('ultimo-aggiornamento').innerText = "Aggiornato: " + new Date().toLocaleTimeString();

            } catch (err) { console.error(err); }
        }

        window.onload = () => {
            const user = localStorage.getItem("utenteLoggato") || "Ospite";
            document.getElementById('userFullname').innerText = user;
            document.getElementById('userInitials').innerText = user.substring(0,2).toUpperCase();
            caricaDati();
            setInterval(caricaDati, 30000);
        };

        function confermaEsci() { if(confirm("Esci?")) { localStorage.clear(); window.location.href="index.html"; } }
    </script>
</body>
</html>
