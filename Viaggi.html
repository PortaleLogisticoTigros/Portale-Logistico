<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piattaforma Tigros - Viaggi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>

         @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        body {
            margin: 0;
            background: linear-gradient(135deg, #2b75ee 0%, #a0861d 100%);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 10;
        }

        .nav-left {
            flex: 1;
            display: flex;
            justify-content: flex-start;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.15);
            padding: 5px 12px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        .user-initials {
            width: 30px;
            height: 30px;
            background: #ffcc00;
            color: #003087;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .user-fullname {
            color: white;
            font-size: 0.85rem;
            text-transform: capitalize;
        }

         nav ul { 
            list-style: none; 
            display: flex; 
            gap: 20px; 
            margin: 0; 
            padding: 0; 
            flex: 1; 
            justify-content: center; 
            text-align: center;
        }


        li a {
            text-decoration: none; 
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            font-size: 1.15rem; 
            transition: all 0.4s ease; 
            cursor: pointer;
            white-space: nowrap;
        }

        .nav-right {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }

        .nav-logo img {
            height: 38px;
            width: auto;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
        }

        
        .dropdown {
            position: relative;
        }

        .dropdown-menu {
            position: absolute;
            top: 150%; /* Lo posiziona esattamente sotto il link padre */
            left: 50%;
            transform: translateX(-50%) translateY(15px); /* Centrato, ma spostato leggermente in giù */
            background: rgba(0, 48, 135, 0.95); /* Blu scuro Tigros semi-trasparente */
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 204, 0, 0.4);
            border-radius: 12px;
            min-width: 220px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 10px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 2000;
        }

      
        .dropdown:hover .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0); 
        }

        .dropdown-menu li {
            width: 100%;
            list-style: none;
        }

       
        .dropdown-menu li a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 15px;
            font-size: 0.95rem;
            text-align: left;
            border-radius: 8px;
            color: white;
        }

        .dropdown-menu li a i {
            color: #ffcc00;
            width: 20px;
            text-align: center;
        }

        .dropdown-menu li a:hover {
            background: rgba(255, 204, 0, 0.15); /* Sfondo giallino al passaggio */
            transform: scale(1.02) !important; /* Disabilita lo zoom esagerato globale per non far sbordare il menu */
            color: #ffcc00;
            filter: none !important; /* Previene sfocature indesiderate */
        }

        ul:hover li a { filter: blur(3px); opacity: 0.5; transform: scale(0.9); }
        ul li a:hover { filter: blur(0px); opacity: 1; transform: scale(1.2); color: #ffcc00; }
        li a.logout { color: #efba0a; }
        li a.logout:hover { color: #ff0000; text-shadow: 0 0 15px rgba(255, 0, 0, 0.6); }


        .iframe-wrapper {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <div class="user-badge" onclick="location.href='info_utente.html'">
                <div class="user-initials" id="userInitials">??</div>
                <span class="user-fullname" id="userFullname">Utente</span>
            </div>
        </div>

        <ul>
            <li><a href="Home_new.html">HOME</a></li>
            
            <li class="dropdown">
                <a href="#">DASHBOARD VIAGGI<i class="fa-solid fa-chevron-down" style="font-size: 0.8rem; margin-left: 5px;"></i></a>
                <ul class="dropdown-menu">
                     <li><a onclick="viaDash()">DASHBOARD VIAGGI (Old)</a></li>
                    <li><a onclick="viaDashNew()">DASHBOARD VIAGGI (Tabella) *BETA</a></li>
                    <li><a onclick="viaDashCard()">DASHBOARD VIAGGI (Card) *BETA</a></li>
                </ul>
            </li>
             <li><a onclick="viaMGZ_Live()">MAGAZZINO LIVE(*Beta)</a></li>
            <li><a onclick="confermaEsci()" style="color:#efba0a">ESCI</a></li>
        </ul>

        <div class="nav-right">
            <div class="nav-logo">
                <img src="LOGO_TIGROS_VERTICALE.jpg" alt="Logo Tigros">
            </div>
        </div>
    </nav>

    <div class="iframe-wrapper">
        <iframe id="dashboardFrame" 
                src="https://it-app.tigros.it/dashboard/fogli_viaggio/cassano.php" 
                allowfullscreen="" 
                loading="lazy">
        </iframe>
    </div>

    <script>

        const accessoMenu = ["GIACOMO BARDELLI", "ERMANNO LAMPERTI"];

        window.onload = function() {
            const nomeUtente = localStorage.getItem("utenteLoggato") || "Ospite";
            document.getElementById('userFullname').innerText = nomeUtente;
            
            const parti = nomeUtente.split(/[._ ]/); 
            let iniziali = "";
            if (parti.length > 1) {
                iniziali = parti[0][0] + (parti[1][0] || "");
            } else {
                iniziali = parti[0][0] + (parti[0][1] || "");
            }
            document.getElementById('userInitials').innerText = iniziali.toUpperCase();

                localStorage.setItem("vista", "viaggiOld")

        };

  
        setInterval(function() {
            const frame = document.getElementById('dashboardFrame');
            frame.src = frame.src; 
            console.log("Dashboard aggiornata");
        }, 20000); 

        function confermaEsci() {
            if (confirm("Sei sicuro di voler uscire dalla Piattaforma Tigros?")) {
                localStorage.removeItem("utenteLoggato");
                window.location.href = "index.html";
            }
        }

        function tornaHome(){
            window.location.href = "Home.html";
        }

         function viaDash(){
            const userAttuale = localStorage.getItem("utenteLoggato");
            const utenteFomattato = userAttuale.trim().toUpperCase();
            const posizione = localStorage.getItem("viaggi");

                        if(posizione === 'viaggiOld'){return;}

                console.log("Utente dal local: ",utenteFomattato);
                console.log("Utenti che hanno accesso: ", accessoMenu);
                    const okAccesso = accessoMenu.includes(utenteFomattato);
                        console.log("Ok accesso ----> ", okAccesso);

                            if(okAccesso){
                                localStorage.removeItem("vista");
                                window.location.href='Viaggi.html';
                            }
                            else{
                                alert("Utente non autorizzato ad accedere al menù");
                            }

        }

                    const okAccesso = accessoMenu.includes(utenteFomattato);
                        console.log("Ok accesso ----> ", okAccesso);

                            if(okAccesso){
                                localStorage.removeItem("vista");
                                window.location.href='viaggi_live.html';
                            }
                            else{
                                alert("Utente non autorizzato ad accedere al menù");
                            }

        }
        
         function viaDashCard(){
            const userAttuale = localStorage.getItem("utenteLoggato");

                console.log("Utente dal local: ",utenteFomattato);

                    const okAccesso = accessoMenu.includes(utenteFomattato);

                            if(okAccesso){
                                localStorage.removeItem("vista");
                                window.location.href='viaggi_live_new.html';

        }   
    </script>

</body>
</html>
