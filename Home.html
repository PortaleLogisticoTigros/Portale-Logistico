<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piattaforma Tigros - Home</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #2b75ee 0%, #a0861d 100%);
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- NAVIGAZIONE --- */
        nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 100;
        }

        .nav-left { flex: 1; display: flex; justify-content: flex-start; }
        .user-badge {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255, 255, 255, 0.15);
            padding: 5px 12px; border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .user-initials {
            width: 30px; height: 30px;
            background: #ffcc00; color: #003087;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-family: Impact, sans-serif;
            font-size: 0.85rem; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .user-fullname { color: white; font-size: 0.85rem; font-weight: 600; text-transform: capitalize; }

        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; flex: 2; justify-content: center; text-align: center;}
        li a { text-decoration: none; color: white; font-family: Impact, sans-serif; font-size: 1.15rem; transition: all 0.4s ease; cursor: pointer; }
        ul:hover li a { filter: blur(2px); opacity: 0.5; transform: scale(0.95); }
        ul li a:hover { filter: blur(0px); opacity: 1; transform: scale(1.15); color: #ffcc00; }
        li a.logout { color: #efba0a; }

        .nav-right { flex: 1; display: flex; justify-content: flex-end; }
        .nav-logo img { height: 38px; width: auto; transition: 0.3s; cursor: pointer; }

        /* --- BENVENUTO --- */
        .welcome-section {
            display: none; position: absolute; top: 90%; left: 50%;
            transform: translate(-50%, -50%); flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            color: rgb(232, 155, 12); z-index: 10;
        }
        .mostra-benvenuto { display: flex !important; }
        .welcome-title {
            font-family: Impact, sans-serif; font-size: 3.5rem;
            text-shadow: 0 10px 30px rgba(0,0,0,0.4);
            animation: welcomeSequence 1.5s ease-in-out forwards; opacity: 0;
        }
        @keyframes welcomeSequence {
            0% { opacity: 0; transform: translateY(30px); }
            20% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-15px); filter: blur(10px); }
        }

        /* --- CONTENUTI --- */
        .main-content { position: absolute; top: 120px; left: 60px; z-index: 50; perspective: 1000px; }
        .secondo-content { position: absolute; top: 120px; left: 600px; z-index: 50; perspective: 1000px; }
        .accessi-content { position: absolute; top: 550px; left: 60px; z-index: 50; perspective: 1000px; }
        .frutta-content { position: absolute; top: 120px; left: 1140px; z-index: 50; perspective: 1000px; }

     
        .book-glass-box, .report-glass-box, .accessi-glass-box, .frutta-glass-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            text-align: center; width: 450px; height: 350px;
            cursor: pointer; transition: all 0.4s ease;
            animation: apparizioneIniziale 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes apparizioneIniziale {
            0% { opacity: 0; filter: blur(20px); transform: scale(0.85); }
            100% { opacity: 1; filter: blur(0px); transform: scale(1); }
        }

        .book-title, .report-title, .accessi-title, .frutta-title {
            font-family: Impact, sans-serif; color: #ecb40c;
            font-size: 40px; margin-bottom: 20px; letter-spacing: 1px;
            transition: transform 1s cubic-bezier(0.6, 0.04, 0.98, 0.335);
        }

 
        .book { width: 150px; height: 200px; position: relative; margin: 0 auto; transform-style: preserve-3d; transition: transform 0.5s; }
        .cover {
            width: 100%; height: 96%;
            background: linear-gradient(45deg, #003087 50%, #ecb40c 50%);
            border-radius: 2px 5px 5px 2px;
            position: absolute; z-index: 5;
            transform-origin: left; top: 5%;
            transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
        }
        .cover::after {
            content: "TIGROS"; color: rgb(6, 41, 198); font-family: Impact;
            font-size: 30px;
        }
        .pages {
            width: 90%; height: 90%; background: white;
            position: absolute; top: 5%; left: 5%; z-index: 1;
            display: flex; flex-direction: column; justify-content: center;
            gap: 5px; padding: 5px; transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
        }
        .chart-line { width: 0; height: 5px; background: #2b75ee; border-radius: 3px; transition: width 0.8s ease 0.4s; }
        .chart-line.yellow { background: #ffcc00; }

        /* Hover Book */
        .book-glass-box:hover .book-title { transform: scale(1.1); }
        .book-glass-box:hover .cover { transform: rotateY(-160deg) translate(-50%); }
        .book-glass-box:hover .pages { transform: translateX(45%); }
        .book-glass-box:hover .chart-line { width: 100%; }
        .book-glass-box:hover .chart-line:nth-child(2) { width: 60%; }
        .book-glass-box:hover .chart-line:nth-child(3) { width: 85%; }

        /* --- LOGICA REPORT (ALLARGAMENTO SIMMETRICO) --- */
        .report { width: 150px; height: 200px; position: relative; margin: 0 auto; }
        .accessi { width: 150px; height: 200px; position: relative; margin: 0 auto; }
        .frutta { width: 150px; height: 200px; position: relative; margin: 0 auto; }
        
        .report_before {
            width: 200px; height: 200px; background: #efba0a;
            border-radius: 80px; position: absolute; z-index: 5;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            transform-origin: center;
            transition: width 0.6s cubic-bezier(0.645, 0.045, 0.355, 1);
            overflow: hidden;
        }
        .frutta_before {
            width: 200px; height: 200px; background: #efba0a;
            border-radius: 80px; position: absolute; z-index: 5;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            transform-origin: center;
            transition: width 0.6s cubic-bezier(0.645, 0.045, 0.355, 1);
            overflow: hidden;
        }
        
         .accessi_before {
            width: 200px; height: 200px; background: #efba0a;
            border-radius: 80px; position: absolute; z-index: 5;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            transform-origin: center;
            transition: width 0.6s cubic-bezier(0.645, 0.045, 0.355, 1);
            overflow: hidden;
        }

        .report_before span {
            display: inline-block; font-family: Impact, sans-serif;
            color: #003087; font-size: 20px; font-weight: bold;
            white-space: nowrap; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .accessi_before span {
            display: inline-block; font-family: Impact, sans-serif;
            color: #003087; font-size: 20px; font-weight: bold;
            white-space: nowrap; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .frutta_before span {
            display: inline-block; font-family: Impact, sans-serif;
            color: #003087; font-size: 20px; font-weight: bold;
            white-space: nowrap; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }


        /* Hover Report */
        .report-glass-box:hover .report-title { transform: scale(1.1); }
        .report-glass-box:hover .report_before { width: 400px; }
        .report-glass-box:hover .report_before span { transform: scale(1.3); }

        .accessi-glass-box:hover .accessi-title { transform: scale(1.1); }
        .accessi-glass-box:hover .accessi_before { width: 400px; }
        .accessi-glass-box:hover .accessi_before span { transform: scale(1.3); }

        .frutta-glass-box:hover .frutta-title { transform: scale(1.1); }
        .frutta-glass-box:hover .frutta_before { width: 400px; }
        .frutta-glass-box:hover .frutta_before span { transform: scale(1.3); }

    </style>

    

</head>
<body>

    <nav>
        <div class="nav-left">
            <div class="user-badge">
                <div class="user-initials" id="userInitials">??</div>
                <span class="user-fullname" id="userFullname">Utente</span>
            </div>
        </div>
        <ul>
            <li><a href="Home.html" style="color: #ffcc00;">HOME</a></li>
            <li><a href="Viaggi.html">DASHBOARD VIAGGI</a></li>
            <li><a href="Ordini.html">DASHBOARD ORDINI</a></li>
            <li><a href="Ricevimenti.html">DASHBOARD RICEVIMENTI</a></li>
            
            <li><a onclick="confermaEsci()" class="logout">ESCI</a></li>
        </ul>
        <div class="nav-right">
            <div class="nav-logo">
                <img src="LOGO_TIGROS_VERTICALE.jpg" alt="Logo Tigros">
            </div>
        </div>
    </nav>

    <div id="welcomeBox" class="welcome-section">
        <h1 class="welcome-title">BENVENUTO NELLA PIATTAFORMA LOGISTICA TIGROS</h1>
    </div>

    <div class="main-content">
        <div class="book-glass-box" id="book" onclick="vaiBook()">
            <h2 class="book-title">BOOK LOGISTICO</h2>
            <div class="book">
                <div class="cover"></div>
                <div class="pages">
                    <div class="chart-line"></div>
                    <div class="chart-line yellow"></div>
                    <div class="chart-line"></div>
                    <div style="font-size: 20px; color: #003087; font-weight: bold; margin-top: 3px; font-family: Impact;">Book Logistico Week</div>
                </div>
            </div>
        </div>
    </div>

    <div class="secondo-content">
        <div class="report-glass-box" id="pescheria" onclick="vaiReport()">
            <h2 class="report-title">CEDI 29 - PESCHERIA</h2>
            <div class="report">
                <div class="report_before">
                    <span>Pescheria</span>
                </div>
            </div>
        </div>
    </div>

     <div class="accessi-content">
        <div class="accessi-glass-box" id="accessi" onclick="sviluppo()">
            <h2 class="accessi-title">ACCESSI PIATTAFORMA</h2>
            <div class="accessi">
                <div class="accessi_before">
                    <span>Accessi</span>
                </div>
            </div>
        </div>
    </div>

    <div class="frutta-content">
        <div class="frutta-glass-box" id="frutta" onclick="sviluppo()">
            <h2 class="frutta-title">CEDI 23 - ORTOFRUTTA</h2>
            <div class="frutta">
                <div class="frutta_before">
                    <span>Ortofrutta</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const comingFrom = document.referrer;
            const welcomeBox = document.getElementById('welcomeBox');
            if (comingFrom.includes("index")) {
                welcomeBox.classList.add('mostra-benvenuto');
            }

            const nomeUtente = localStorage.getItem("utenteLoggato") || "Ospite";
            document.getElementById('userFullname').innerText = nomeUtente;
            
            const parti = nomeUtente.split(/[._ ]/); 
            let iniziali = (parti.length > 1) ? parti[0][0] + parti[1][0] : parti[0][0] + (parti[0][1] || "");
            document.getElementById('userInitials').innerText = iniziali.toUpperCase();
        };

        function vaiReport(){
            window.location.href = "ControlloPescheria.html";
        }

        function confermaEsci() {
            if (confirm("Sei sicuro di voler uscire dalla Piattaforma Tigros?")) {
                localStorage.removeItem("utenteLoggato");
                window.location.href = "index.html";
            }
        }
        function vaiBook(){ window.location.href = "book.html"; }
        function tornaHome(){ window.location.href = "Home.html"; }
        
        function sviluppo(){
            alert("Sezione non diponibile.\nIn fase di sviluppo.");
        }


    </script>
</body>
</html>
