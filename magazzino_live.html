<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tigros - Panoramica Live</title>
    <link rel="icon" type="image/png" href="images.png">
    <link rel="apple-touch-icon" href="images.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        body { 
            margin: 0; 
            background: linear-gradient(135deg, #2b75ee 0%, #a0861d 100%); 
            font-family: 'Montserrat', sans-serif; 
            color: white; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        /* --- NAVBAR TIGROS --- */
        nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-left { flex: 0 0 auto; display: flex; align-items: center; gap: 15px; }
        .user-badge { display: flex; align-items: center; gap: 10px; background: rgba(255, 255, 255, 0.15); padding: 5px 12px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.2); cursor: pointer; }
        .user-initials { width: 30px; height: 30px; background: #ffcc00; color: #003087; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85rem; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .user-fullname { color: white; font-size: 0.85rem; font-weight: 500; }
        
        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; flex: 1; justify-content: center; }
        nav ul li a { text-decoration: none; color: white; font-size: 1.15rem; transition: all 0.4s ease; cursor: pointer; white-space: nowrap; }
        nav ul:hover li a { filter: blur(2px); opacity: 0.5; transform: scale(0.95); }
        nav ul li a:hover { filter: blur(0px); opacity: 1; transform: scale(1.15); color: #ffcc00; }
        .logout { color: #efba0a !important; }
        
        .nav-right { flex: 0 0 auto; display: flex; justify-content: flex-end; align-items: center; gap: 15px;}
        .nav-logo img { height: 38px; width: auto; }
        .btn-refresh { background: #ffcc00; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s;}
        .btn-refresh:hover { transform: scale(1.1); }

   
        .main-wrapper {
            flex: 1;
            padding: 20px;
            margin-top: 20px;
            overflow-y: auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #loader-mag { text-align: center; color: #ffcc00; font-size: 1.2rem; margin-top: 50px; font-weight: bold; }
        #ultimo-aggiornamento { font-size: 0.75rem; color: rgba(255,255,255,0.7); text-align: center; margin-top: 15px; width: 100%; }

        .table-container {
            width: 100%;
            max-width: 1800px; /* Allargata per ospitare le nuove colonne */
            background: rgba(0, 48, 135, 0.4);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            overflow-x: auto;
            display: none;
        }

        table {
            width: 100%;
            border-collapse: separate; 
            border-spacing: 0;
            color: white;
            white-space: nowrap;
        }

        .header-pill {
            background-color: #003087;
            color: #ffcc00;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
            text-align: center;
            border: 2px solid #003087;
            margin-bottom: 5px;
        }

        thead tr:nth-child(2) th {
            font-size: 0.85rem;
            font-weight: 400;
            padding: 15px 10px 10px 10px;
            text-transform: uppercase;
            border-bottom: 2px solid #ffcc00;
            color: #ffcc00;
        }


        tbody td {
            padding: 12px 10px;
            font-size: 1.05rem;
            text-align: center;
        }
        
       
        .group-bottom td {
            border-bottom: 2px solid rgba(255, 204, 0, 0.3);
        }

        .col-cedi { width: 50px; font-weight: normal; }
        .col-area { text-align: left !important; color: #ffcc00; font-weight: bold; width: 150px;}
        .col-flusso { text-align: left !important; font-size: 0.85rem !important; color: #cbd5e1; width: 130px; white-space: normal; line-height: 1.2; }
     
        .border-right-yellow { border-right: 2px solid #ffcc00; }
        

        .row-totale td {
            font-weight: 900;
            font-size: 1.1rem;
            padding: 15px 10px;
            border-top: 2px solid #ffcc00;
            border-bottom: none !important;
            background: rgba(0, 48, 135, 0.6);
        }
        .row-totale .col-area { color: #ffcc00; }

        .progress-bg {
            width: 100%;
            min-width: 120px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            height: 22px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .progress-fill {
            background: linear-gradient(90deg, #ffcc00, #ff9900);
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
            transition: width 1s ease-in-out;
        }
        .progress-text {
            position: absolute;
            width: 100%;
            text-align: center;
            line-height: 22px;
            font-size: 0.75rem;
            font-weight: 900;
            color: #003087;
            z-index: 2;
        }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #ffcc00; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #facc15; }

    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <div class="user-badge" onclick="location.href='info_utente.html'">
                <div class="user-initials" id="userInitials">??</div>
                <span class="user-fullname" id="userFullname">Utente</span>
            </div>
        </div>
        <ul>
            <li><a href="Home_new.html">HOME</a></li>
            <li><a href="Viaggi.html">DASHBOARD VIAGGI</a></li>
            <li><a onclick="confermaEsci()" class="logout">ESCI</a></li>
        </ul>
        <div class="nav-right">
            <button class="btn-refresh" onclick="caricaTutto()" title="Aggiorna Dati">
                <svg viewBox="0 0 24 24" style="width:18px; fill:#003087;"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            </button>
            <div class="nav-logo"><img src="LOGO_TIGROS_VERTICALE.jpg" alt="Logo"></div>
        </div>
    </nav>

    <div class="main-wrapper">
        <div id="loader-mag">Sincronizzazione Dati in corso... <i class="fa-solid fa-spinner fa-spin"></i></div>
        
        <div class="table-container" id="mainTable">
            <table>
                <thead>
                    <tr>
                        <th colspan="2" class="border-right-yellow" style="border-bottom: none;"></th>
                        <th colspan="5" class="border-right-yellow" style="border-bottom: none;">
                            <div class="header-pill">RICEVIMENTO MERCI</div>
                        </th>
                        <th colspan="5" style="border-bottom: none;">
                            <div class="header-pill">PREPARAZIONE PIATTAFORMA</div>
                        </th>
                    </tr>
                    <tr>
                        <th style="text-align: left;">CEDI</th>
                        <th class="border-right-yellow" style="text-align: left;">AREA</th>
                        <th style="text-align: left;">ATTIVITA'</th>
                        <th>ORDINATI</th>
                        <th>RICEVUTI</th>
                        <th>MANCANTI</th>
                        <th class="border-right-yellow">PROGRESSO</th>
                        <th style="text-align: left;">AREA PREPARAZIONE</th>
                        <th>ORDINATI</th>
                        <th>PREPARATI</th>
                        <th>RIMASTI</th>
                        <th>PROGRESSO</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabella">
                    </tbody>
            </table>
        </div>
        
        <div id="ultimo-aggiornamento"></div>
    </div>

    <script>
        const linkCSV_Ric = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSCD2u3-ErC6NQWjRERPsojHNqDOyOcmAT46HIHIrscoY9wC6ljoajpv8sqN0HEQ_m0P2f4ggXjkWtY/pub?output=csv';
        const linkCSV_PrepMag = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ1HEv87Esyv53CeLeDtM5sI0FGXvbjWtDsA1_GY3gin3GBMBQ7SdS31rR8C1l2o0eUGwjIQYrvJxuW/pub?output=csv';
        const linkCSV_PrepLab = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQJDecwQTsnTMoubMCP6giwt7KnPbKa1cnWHL4gUmmO5d1OJvlJzWsunlH9koplOUFHAiOogVhGPqpd/pub?output=csv';

        // DEFINIZIONE STRUTTURALE DEI GRUPPI (Permette layout 1:2, 2:2 ecc)
        const configAree = [
            {
                cedi: "21", area: "FRESCHI",
                ric: [ { l: "Ricevimento", m: ["CASSANO SAFO"] } ],
                prep: [ { l: "Ventilazione", m: ["VENTILA"] }, { l: "Picking", m: ["PICKING"] } ]
            },
            {
                cedi: "23", area: "ORTOFRUTTA",
                ric: [ { l: "P. Variabile", m: ["EM ORTOFRUTTA ARTICOLI A PESO VARIABILE"] }, { l: "P. Fisso", m: ["EM ORTOFRUTTA ARTICOLI A PESO FISSO"] } ],
                prep: [ { l: "Vent. Frutta", m: ["FRUTTA"] }, { l: "Vent. IV Gamma", m: ["4 GAMMA"] } ]
            },
            {
                cedi: "24", area: "GROCERY (Cameri)",
                ric: [ { l: "Ricevimento", m: ["CASSANO GROCERY"] } ],
                prep: [ { l: "Picking", m: ["CASS PICK"] }, { l: "Picking Expo", m: ["EXPO PICK"] } ]
            },
            {
                cedi: "25", area: "MAT. CONSUMO",
                ric: [ { l: "Ricevimento", m: ["MATERIALI DI CONSUMO"] } ],
                prep: [ { l: "Picking", m: ["PICKING"] } ]
            },
            {
                cedi: "28", area: "MACELLERIA",
                ric: [ { l: "Ricevimento", m: ["EM MACELLERIA"] } ],
                prep: [ { l: "Ventilazione", m: ["VENTILA"] } ]
            },
            {
                cedi: "29", area: "PESCHERIA",
                ric: [ { l: "Ricevimento", m: ["EM ITTICO"] } ],
                prep: [ { l: "Ventilazione", m: ["VENTILA"] } ]
            },
            {
                cedi: "30", area: "FORNO",
                ric: [ { l: "Ricevimento", m: ["FORNO - ENTRATA MERCE"] } ],
                prep: [ { l: "Precotto", m: ["PRECOTTO"] }, { l: "Pane Fresco", m: ["FRESCO"] } ]
            },
            {
                cedi: "31", area: "PASTICCERIA",
                ric: [ { l: "Ricevimento", m: ["PASTICCERIA - ENTRATA MERCE"] } ],
                prep: [ { l: "Produzione", m: ["PAST_VENTI"] } ]
            },
            {
                cedi: "35", area: "ACQUE / PELLET",
                ric: [ { l: "Ricevimento", m: ["GRO_CASSANO CATASTA"] } ],
                prep: [ { l: "Omogenei", m: ["CASS PICK"] } ]
            }
        ];

        window.onload = function() {
            let userRaw = (localStorage.getItem("utenteLoggato") || "Ospite").trim();
            let userFormattato = userRaw.split(/[ ._-]+/).map(p => p.charAt(0).toUpperCase() + p.slice(1).toLowerCase()).join(" ");
            document.getElementById('userFullname').innerText = userFormattato;
            
            const parti = userRaw.split(/[ ._-]+/);
            let inits = (parti.length >= 2) ? parti[0][0] + parti[1][0] : userRaw.substring(0, 2);
            document.getElementById('userInitials').innerText = inits.toUpperCase();

            caricaTutto();

           setInterval(() => caricaTutto(true), 60000);

        };

        function confermaEsci() { 
            if(confirm("Chiudere sessione?")) { localStorage.clear(); window.location.href="index.html"; } 
        }

        function parseCSVLine(line, separator) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let char of line) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === separator && !inQuotes) { result.push(current.trim()); current = ''; } 
                else { current += char; }
            }
            result.push(current.trim());
            return result;
        }

        function formatNum(num) {
            if(num === null || isNaN(num) || num === 0) return "-";
            return num.toLocaleString('it-IT');
        }

        function creaBarra(percentuale) {
            let widthVisiva = percentuale > 100 ? 100 : (percentuale < 0 ? 0 : percentuale);
            return `
                <div class="progress-bg">
                    <div class="progress-fill" style="width: ${widthVisiva}%;"></div>
                    <div class="progress-text">${percentuale}%</div>
                </div>
            `;
        }

       async function caricaTutto(isBackground = false) {

           if (!isBackground) {
                document.getElementById('loader-mag').style.display = 'block';
                document.getElementById('mainTable').style.display = 'none';
            }

            try {
                const [resRic, resPrepMag, resPrepLab] = await Promise.all([
                    fetch(`${linkCSV_Ric}&nocache=${new Date().getTime()}`).then(r => r.text()),
                    fetch(`${linkCSV_PrepMag}&nocache=${new Date().getTime()}`).then(r => r.text()),
                    fetch(`${linkCSV_PrepLab}&nocache=${new Date().getTime()}`).then(r => r.text())
                ]);

                // Generazione Working Data model
                let dataMatrix = configAree.map(conf => ({
                    cedi: conf.cedi, area: conf.area,
                    ric: conf.ric.map(r => ({ l: r.l, m: r.m, ord: 0, fatti: 0 })),
                    prep: conf.prep.map(p => ({ l: p.l, m: p.m, ord: 0, fatti: 0 }))
                }));

                // Funzione Helper per smistare i dati ai corretti oggetti
                function popolaDati(csvText, tipo, colOrd, colFatti) {
                    let righe = csvText.split('\n').filter(r => r.trim() !== '');
                    if (righe.length <= 1) return;
                    let sep = righe[0].includes(';') ? ';' : ',';
                    let headers = parseCSVLine(righe[0], sep).map(h => h.trim().toUpperCase());
                    let idx = {
                        cedi: headers.indexOf("CEDI"), area: headers.indexOf("AREA_PREPARAZIONE"),
                        ord: headers.indexOf(colOrd), fatti: headers.indexOf(colFatti)
                    };
                    
                    for(let i = 1; i < righe.length; i++) {
                        let col = parseCSVLine(righe[i], sep);
                        if(col.length < headers.length) continue;
                        let cedi = col[idx.cedi] || "", area = col[idx.area] || "";
                        
                        let gruppoTarget = dataMatrix.find(d => d.cedi === cedi);
                        if (gruppoTarget) {
                            let listaTarget = (tipo === 'RIC') ? gruppoTarget.ric : gruppoTarget.prep;
                            let matchObj = listaTarget.find(x => x.m.includes(area));
                            if (matchObj) {
                                matchObj.ord += Number(col[idx.ord]) || 0;
                                matchObj.fatti += Number(col[idx.fatti]) || 0;
                            }
                        }
                    }
                }

                // Esegui la mappatura
                popolaDati(resRic, 'RIC', "COLLI_ORDINATI", "COLLI_RICEVUTI");
                popolaDati(resPrepMag, 'PREP', "COLLI_ORD", "COLLI_PREPARATI");
                popolaDati(resPrepLab, 'PREP', "COLLI_ORD", "COLLI_PREPARATI");

                costruisciTabella(dataMatrix);

            } catch (err) {
                console.error(err);
                document.getElementById('loader-mag').innerHTML = "Errore durante la sincronizzazione dati. Riprova.";
            }
        }

        function costruisciTabella(dataMatrix) {
            let html = "";
            let totRicOrd = 0, totRicFatti = 0, totRicManc = 0;
            let totPrepOrd = 0, totPrepFatti = 0, totPrepRimasti = 0;

            dataMatrix.forEach(d => {
                let maxRows = Math.max(d.ric.length, d.prep.length);
                if (maxRows === 0) return;

                // Calcoli Globali per questo gruppo
                d.ric.forEach(r => { totRicOrd += r.ord; totRicFatti += r.fatti; totRicManc += Math.max(0, r.ord - r.fatti); });
                d.prep.forEach(p => { totPrepOrd += p.ord; totPrepFatti += p.fatti; totPrepRimasti += Math.max(0, p.ord - p.fatti); });

                for (let i = 0; i < maxRows; i++) {
                    let isLastRowInGroup = (i === maxRows - 1);
                    let rowClass = isLastRowInGroup ? "group-bottom" : "";
                    html += `<tr class="${rowClass}">`;

                    // Colonne fisse (Area e CEDI): solo alla riga 0, con rowspan
                    if (i === 0) {
                        html += `<td rowspan="${maxRows}" class="col-cedi">${d.cedi}</td>`;
                        html += `<td rowspan="${maxRows}" class="col-area border-right-yellow">${d.area}</td>`;
                    }

            
                    if (d.ric.length === 1) {
                  
                        if (i === 0) {
                            let r = d.ric[0];
                            let mancanti = Math.max(0, r.ord - r.fatti);
                            let perc = r.ord > 0 ? Math.round((r.fatti / r.ord) * 100) : 0;
                            html += `
                                <td rowspan="${maxRows}" class="col-flusso">${r.l}</td>
                                <td rowspan="${maxRows}">${formatNum(r.ord)}</td>
                                <td rowspan="${maxRows}">${formatNum(r.fatti)}</td>
                                <td rowspan="${maxRows}" style="color: ${mancanti > 0 ? 'white' : 'white'}">${formatNum(mancanti)}</td>
                                <td rowspan="${maxRows}" class="border-right-yellow" style="padding: 0 15px;">${r.ord > 0 ? creaBarra(perc) : '-'}</td>
                            `;
                        }
                    } else {
                        
                        if (i < d.ric.length) {
                            let r = d.ric[i];
                            let mancanti = Math.max(0, r.ord - r.fatti);
                            let perc = r.ord > 0 ? Math.round((r.fatti / r.ord) * 100) : 0;
                            html += `
                                <td class="col-flusso">${r.l}</td>
                                <td>${formatNum(r.ord)}</td>
                                <td>${formatNum(r.fatti)}</td>
                                <td style="color: ${mancanti > 0 ? 'white' : 'white'}">${formatNum(mancanti)}</td>
                                <td class="border-right-yellow" style="padding: 0 15px;">${r.ord > 0 ? creaBarra(perc) : '-'}</td>
                            `;
                        } else {
                            html += `<td colspan="5" class="border-right-yellow"></td>`;
                        }
                    }

                    // --- SEZIONE PREPARAZIONE ---
                    if (d.prep.length === 1) {
                        if (i === 0) {
                            let p = d.prep[0];
                            let rimasti = Math.max(0, p.ord - p.fatti);
                            let perc = p.ord > 0 ? Math.round((p.fatti / p.ord) * 100) : 0;
                            html += `
                                <td rowspan="${maxRows}" class="col-flusso">${p.l}</td>
                                <td rowspan="${maxRows}">${formatNum(p.ord)}</td>
                                <td rowspan="${maxRows}">${formatNum(p.fatti)}</td>
                                <td rowspan="${maxRows}">${formatNum(rimasti)}</td>
                                <td rowspan="${maxRows}" style="padding: 0 15px;">${p.ord > 0 ? creaBarra(perc) : '-'}</td>
                            `;
                        }
                    } else {
                        if (i < d.prep.length) {
                            let p = d.prep[i];
                            let rimasti = Math.max(0, p.ord - p.fatti);
                            let perc = p.ord > 0 ? Math.round((p.fatti / p.ord) * 100) : 0;
                            html += `
                                <td class="col-flusso">${p.l}</td>
                                <td>${formatNum(p.ord)}</td>
                                <td>${formatNum(p.fatti)}</td>
                                <td>${formatNum(rimasti)}</td>
                                <td style="padding: 0 15px;">${p.ord > 0 ? creaBarra(perc) : '-'}</td>
                            `;
                        } else {
                            html += `<td colspan="5"></td>`;
                        }
                    }

                    html += `</tr>`;
                }
            });

            // Riga dei totali
            let percTotRic = totRicOrd > 0 ? Math.round((totRicFatti / totRicOrd) * 100) : 0;
            let percTotPrep = totPrepOrd > 0 ? Math.round((totPrepFatti / totPrepOrd) * 100) : 0;

            html += `
                <tr class="row-totale">
                    <td colspan="2" class="col-area border-right-yellow" style="text-align: right !important; padding-right: 20px;">TOTALE PIATTAFORMA</td>
                    
                    <td></td>
                    <td>${totRicOrd > 0 ? totRicOrd.toLocaleString('it-IT') : '-'}</td>
                    <td style="color:#4ade80;">${totRicFatti > 0 ? totRicFatti.toLocaleString('it-IT') : '-'}</td>
                    <td style="color:#ff4d4d;">${totRicManc > 0 ? totRicManc.toLocaleString('it-IT') : '-'}</td>
                    <td class="border-right-yellow" style="padding: 0 15px;">${totRicOrd > 0 ? creaBarra(percTotRic) : '-'}</td>
                    
                    <td></td>
                    <td>${totPrepOrd > 0 ? totPrepOrd.toLocaleString('it-IT') : '-'}</td>
                    <td style="color:#4ade80;">${totPrepFatti > 0 ? totPrepFatti.toLocaleString('it-IT') : '-'}</td>
                    <td>${totPrepRimasti > 0 ? totPrepRimasti.toLocaleString('it-IT') : '-'}</td>
                    <td style="padding: 0 15px;">${totPrepOrd > 0 ? creaBarra(percTotPrep) : '-'}</td>
                </tr>
            `;

            document.getElementById('corpo-tabella').innerHTML = html;
            
            document.getElementById('loader-mag').style.display = 'none';
            document.getElementById('mainTable').style.display = 'block';
            document.getElementById('ultimo-aggiornamento').innerText = "Ultimo Aggiornamento Dati: " + new Date().toLocaleTimeString('it-IT');
        }
    </script>
</body>
</html>
