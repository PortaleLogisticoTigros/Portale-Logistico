<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piattaforma Tigros - Book Logistico</title>
    <link rel="icon" type="image/png" href="images.png">
    <link rel="apple-touch-icon" href="images.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        body {
            margin: 0;
            background: linear-gradient(135deg, #2b75ee 0%, #a0861d 100%);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 10;
        }

        .nav-left { flex: 1; display: flex; justify-content: flex-start; }
        .user-badge {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255, 255, 255, 0.15);
            padding: 5px 12px; border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        .user-initials {
            width: 30px; height: 30px; background: #ffcc00; color: #003087;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-weight: bold; font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .user-fullname { color: white; font-size: 0.85rem; text-transform: capitalize; white-space: nowrap; }

        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; flex: 2; justify-content: center; text-align: center;}
        li a { text-decoration: none; color: white; font-family: 'Montserrat', sans-serif; font-size: 1.15rem; transition: all 0.4s ease; cursor: pointer; white-space: nowrap; }

        .nav-right { flex: 1; display: flex; justify-content: flex-end; align-items: center; }
        .nav-right .caricoPDF {
            background: #ffcc00; color: #003087; border: none;
            padding: 10px 30px; border-radius: 25px; font-weight: bold;
            font-size: 15px;
            font-family: 'Montserrat', sans-serif; cursor: pointer; transition: all 0.3s ease; margin-right: 20px;
        }

        .nav-right .stampaPDF {
            background: #ffcc00; color: #003087; border: none;
            padding: 10px 30px; border-radius: 25px; font-weight: bold;
            font-size: 15px;
           font-family: 'Montserrat', sans-serif; cursor: pointer; transition: all 0.3s ease; margin-right: 20px;
        }

        .nav-logo img { height: 40px; width: auto; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2)); }
        .caricoPDF:hover { background: #003087; color: #ff9900; transform: scale(1.05); }
        .stampaPDF:hover { background: #003087; color: #ff9900; transform: scale(1.05); }

        ul:hover li a { filter: blur(2px); opacity: 0.6; }
        ul li a:hover { filter: blur(0px); opacity: 1; transform: scale(1.1); color: #ffcc00; }
        
        .iframe-wrapper {
            flex-grow: 1;
            position: relative;
            width: 100%;
            height: 100%;
            background: #333;
            border: none;
        }

        iframe { width: 100%; height: 100%; border: none; display: block; position: absolute; top:0; left:0; }

        #loaderContainer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
            color: white;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid #ffcc00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        .titolo-book{
            align-content: center;
            margin-left: 30px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.25rem;
            color: #ffcc00;
            font-weight: 600;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fab-container {
            position: fixed; bottom: 30px; right: 30px; z-index: 1000;
        }
        
        .fab-button {
            width: 55px; height: 55px; background-color:#ffcc00; color: #003087;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 28px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 2px solid #ffcc00; transition: transform 0.3s;
        }
        .fab-button:hover { transform: scale(1.1); }
        
        .fab-menu {
            position: absolute; bottom: 70px; right: 0; background: rgba(0, 48, 135, 0.95);
            backdrop-filter: blur(10px); border: 1px solid #ffcc00; border-radius: 10px;
            padding: 10px 0; display: none; flex-direction: column; min-width: 200px; width: 400px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .fab-menu.active { display: flex; animation: fadeUp 0.3s ease; }
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }

        .fab-item {
            padding: 12px 20px; color: white; font-family: 'Montserrat', sans-serif;
            font-size: 16px; cursor: pointer; transition: background 0.2s;
        }
        .fab-item:hover { background: #ffcc00; color: #003087;}


        @media (max-width: 1000px) {
            body { height: 100vh; overflow: hidden; }
            

            nav {
                flex-direction: row; flex-wrap: nowrap; overflow-x: auto;
                -webkit-overflow-scrolling: touch; padding: 10px; gap: 15px;
               scrollbar-width: none; 
            }
            nav::-webkit-scrollbar { display: none; } 
            .nav-left, nav ul{ flex: 0 0 auto; width: auto; justify-content: flex-start; margin: 0; padding: 0; }
            .nav-right { flex: 0 0 auto; width: auto; justify-content: flex-end; margin: 0; padding: 0; }
            .user-fullname { display: none; }
            .user-badge { padding: 5px; background: transparent; border: none; }
            nav ul { gap: 15px; overflow: visible; }
            nav ul li a { font-size: 0.9rem; }
            .nav-right { flex-direction: row; flex-wrap: nowrap; gap: 5px; justify-content: flex-end;}
           
            .nav-right button, .caricoPDF, .stampaPDF { 
            width: 100px; 
            height: 30px; 
            font-size: 8px;
            padding: 2px;
            white-space: nowrap;
            display: flex;
            justify-content: center; 
            align-items: center; 
        }
            .nav-logo { margin-left: 5px; }
            .nav-logo img { height: 30px; align-self: flex-end; }
            .titolo-book { display: none; }
            .iframe-wrapper { flex: 1; height: auto; width: 100%; }




        }
    </style>
</head>
<body>


    <nav>
        <div class="nav-left">
            <div class="user-badge" onclick="location.href='info_utente.html'">
                <div class="user-initials" id="userInitials">??</div>
                <span class="user-fullname" id="userFullname">Utente</span>
                
            </div>
            <small class="titolo-book" id="titoloBook"></small>
        </div>

        <ul>
            <li><a href="Home_new.html">HOME</a></li>
            <li><a href="Viaggi.html">DASHBOARD VIAGGI</a></li>
            <li><a onclick="confermaEsci()" style="color:#efba0a">ESCI</a></li>
        </ul>

        <div class="nav-right">
                <button class="caricoPDF" id="btnUpload" onclick="document.getElementById('hiddenFileInput').click()">Carica pdf</button>
                    <input type="file" id="hiddenFileInput" accept="application/pdf" style="display: none;" onchange="gestisciUpload(this)">
                
                <button class="stampaPDF" id="btnPrint" onclick="scaricaDocumento()">Scarica pdf</button>
                
                <div class="nav-logo">
                    <img src="LOGO_TIGROS_VERTICALE.jpg" alt="Logo Tigros">
                </div>
            </div>
    </nav>

    <div class="iframe-wrapper">
        <div id="loaderContainer">
            <div class="spinner"></div>
            <p id="loaderText" style="color:#ffcc00; font-family: 'Montserrat', sans-serif;">Caricamento dei PDF in corso...</p>
        </div>
        
        <iframe id="pdfFrame" src="" style="visibility: hidden; display: none;" onload="nascondiLoader()"></iframe>
        <iframe id="pdfFrame-pes" src="" style="visibility: hidden; display: none;" onload="nascondiLoader()"></iframe>
        <iframe id="pdfFrame-orto" src="" style="visibility: hidden; display: none;" onload="nascondiLoader()"></iframe>
    </div>

     <div class="fab-container" id="fab-container">
        <div class="fab-menu" id="fabMenu">
            <div class="fab-item" onclick="apriBookLogistico()"><i class="fa-solid fa-file-pdf"></i> Book Logistico</div>
            <div class="fab-item" onclick="apriBookPescheria()"><i class="fa-solid fa-fish-fins"></i> Book Controllo Qualità Pescheria</div>
            <div class="fab-item" onclick="apriBookOrtofrutta()"><i class="fa-solid fa-apple-whole"></i> Book Controllo Qualità Ortofrutta</div>
        </div>
        <div class="fab-button" onclick="toggleMenu(event)">⋮</div>
    </div>

    <script>
        const webAppUrl = "https://script.google.com/macros/s/AKfycbzPmiowGOk2ZO8i9prMbGVfKlVpDV8UIBL02NUUGZbMBueY91KiX96Nd1698aVBZVGYMg/exec";
        const webAppUpload = 'https://script.google.com/macros/s/AKfycbxjgzkWhP284tzaZjKS2_siazqUYIJcNO8hu6SsktyTWbsxqORHkpuj7OUia2nRDaFWjQ/exec';
        const utentiAutorizzati = ["GIACOMO BARDELLI"];
    
  
        function getIframeAttivo() {
            const bookAperto = localStorage.getItem("bookAperto") || "logistico";
            if (bookAperto === "pescheria") return document.getElementById('pdfFrame-pes');
            if (bookAperto === "ortofrutta") return document.getElementById('pdfFrame-orto');
            return document.getElementById('pdfFrame');
        }

        function nascondiLoader() {
            document.getElementById('loaderContainer').style.display = 'none';
            // Rende visibile solo quello attualmente attivo
            getIframeAttivo().style.visibility = 'visible';
        }

        function apriBookLogistico() {
            localStorage.setItem("bookAperto", "logistico");
            document.getElementById('titoloBook').innerText = "Book Logistico Settimanale";
            document.getElementById('pdfFrame').style.display = 'block';
            document.getElementById('pdfFrame').style.visibility = 'visible';
            document.getElementById('pdfFrame-pes').style.display = 'none';
            document.getElementById('pdfFrame-orto').style.display = 'none';
        }

        function apriBookPescheria() {
            localStorage.setItem("bookAperto", "pescheria");
            document.getElementById('titoloBook').innerText = "Book Controllo Qualità Pescheria";
            document.getElementById('pdfFrame').style.display = 'none';
            document.getElementById('pdfFrame-pes').style.display = 'block';
            document.getElementById('pdfFrame-pes').style.visibility = 'visible';
            document.getElementById('pdfFrame-orto').style.display = 'none';
        }

        function apriBookOrtofrutta() {
            localStorage.setItem("bookAperto", "ortofrutta");
            document.getElementById('titoloBook').innerText = "Book Controllo Qualità Ortofrutta";
            document.getElementById('pdfFrame').style.display = 'none';
            document.getElementById('pdfFrame-pes').style.display = 'none';
            document.getElementById('pdfFrame-orto').style.display = 'block';
            document.getElementById('pdfFrame-orto').style.visibility = 'visible';
        }

        function mostraLoader(testo) {
            document.getElementById('loaderText').innerText = testo || "Caricamento PDF in corso...";
            document.getElementById('loaderContainer').style.display = 'flex';
            document.getElementById('pdfFrame').style.visibility = 'hidden';
            document.getElementById('pdfFrame-pes').style.visibility = 'hidden';
            document.getElementById('pdfFrame-orto').style.visibility = 'hidden';
        }

        // Funzione per convertire il link in modalità anteprima
        function formattaURL(url) {
            if (url && url.startsWith("http")) {
                let finalUrl = url.replace("/view", "/preview");
                finalUrl += "#pagemode=thumbs&view=FitH&toolbar=1";
                return finalUrl;
            }
            return "";
        }

        window.addEventListener('load', async function() {
            mostraLoader("Caricamento Documenti in corso...");

            const nomeUtente = localStorage.getItem("utenteLoggato") || "Ospite";
            document.getElementById('userFullname').innerText = nomeUtente;
            
            nomeFormattato = nomeUtente.toUpperCase();
            const btnUpload = document.getElementById('btnUpload');
            if (utentiAutorizzati.includes(nomeFormattato)) {
                btnUpload.style.display = "flex"; 
            } else {
                btnUpload.remove();
            }

            try {

                const response = await fetch(webAppUrl + "?t=" + new Date().getTime());
                const dati = await response.json(); // Usiamo .json() invece di .text()
   
                if (dati.logistico) document.getElementById('pdfFrame').src = formattaURL(dati.logistico);
                if (dati.pescheria) document.getElementById('pdfFrame-pes').src = formattaURL(dati.pescheria);
                if (dati.ortofrutta) document.getElementById('pdfFrame-orto').src = formattaURL(dati.ortofrutta);


                const bookAperto = localStorage.getItem("bookAperto") || "logistico";

                if (bookAperto === "pescheria") {
                    apriBookPescheria();
                } else if (bookAperto === "ortofrutta") {
                    apriBookOrtofrutta();
                } else {
                    apriBookLogistico();
                }

            } catch (err) {
                console.error("Errore Drive:", err);
                document.getElementById('loaderText').innerText = "Impossibile recuperare i documenti. Riprova più tardi.";
            }

            const parti = nomeUtente.split(/[._ ]/); 
            let iniziali = (parti.length > 1) ? (parti[0][0] + parti[1][0]) : (parti[0][0] + (parti[0][1] || ""));
            document.getElementById('userInitials').innerText = iniziali.toUpperCase();
        });

        function toggleMenu(event) {
            event.stopPropagation(); 
            document.getElementById('fabMenu').classList.toggle('active');
        }
        
        document.addEventListener('click', function(event) {
            const menu = document.getElementById('fabMenu');
            if (menu.classList.contains('active')) {
                menu.classList.remove('active');
            }
        });

        async function gestisciUpload(input) {
            const nomeUtenteLoggato = localStorage.getItem("utenteLoggato") || "Ospite";
            nomeFormattatoControllo = nomeUtenteLoggato.toUpperCase();


            if (!utentiAutorizzati.includes(nomeFormattatoControllo)) {
                alert("Accesso negato " + nomeUtenteLoggato + " non hai i permessi per caricare file.");
                return;
            }

            const file = input.files[0];
                if (!file) return;
            
            

            const nomepercontrollo = file.name.trim().toLowerCase();
                console.log("nome per il controllo del frame nel quale forzare la vista del loader: " + nomepercontrollo);
            
                let frameAnteprima = "";
                    
                    if(nomepercontrollo.includes("book logistico")){
                       frameAnteprima = 'BookLogistico';
                    }
                    else if(nomepercontrollo.includes("book controllo qualita pescheria")){
                        frameAnteprima = 'BookPescheria';
                    }
                    else if(nomepercontrollo.includes("book controllo qualita ortofrutta")){
                        frameAnteprima = 'BookOrtofrutta';
                    }
                    else{
                        alert("Il nome del file caricato non è corretto. Assicurati che contenga 'book logistico', 'book controllo qualita pescheria' o 'book controllo qualita ortofrutta'.");
                        input.value = "";
                        return;
                    }
         
            mostraLoader("Elaborazione file caricato...");

           
            const blobUrl = URL.createObjectURL(file);
                            
                            if(frameAnteprima === ''){
                                alert("Non è stato possibile determinare il book di destinazione per l'anteprima. Assicurati che il nome del file contenga 'book logistico', 'book controllo qualita pescheria' o 'book controllo qualita ortofrutta'.");
                                input.value = "";
                                return;
                            }

                    
                    if(frameAnteprima === 'BookLogistico'){
                        document.getElementById('pdfFrame').src = blobUrl + "#pagemode=thumbs";
                         apriBookLogistico(); 
                    }
                    else if(frameAnteprima === 'BookPescheria'){
                        document.getElementById('pdfFrame-pes').src = blobUrl + "#pagemode=thumbs";
                            apriBookPescheria();
                    }
                    else if(frameAnteprima === 'BookOrtofrutta'){
                        document.getElementById('pdfFrame-orto').src = blobUrl + "#pagemode=thumbs";
                            apriBookOrtofrutta();
                    }

           

            const btn = document.getElementById('btnUpload');
            btn.innerText = "SALVATAGGIO...";
            btn.disabled = true;

                let controlloNome = file.name.toLowerCase();
                let azione = '';
                    
                    console.log("Nome file caricato: " + file.name);
                    console.log("Controllo nome file: " + controlloNome);

                        if(controlloNome.includes("book logistico")){
                            azione = "uploadPDF";
                        }
                        else if(controlloNome.includes("book controllo qualita pescheria")){
                            azione = "uploadPDFPescheria";
                        }
                        else if(controlloNome.includes("book controllo qualita ortofrutta")){
                            azione = "uploadPDFOrtofrutta";
                        }

                           
                            console.log("Azione determinata: " + azione);

            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64Data = e.target.result.split(',')[1];
                const payload = { azione: azione, blob: base64Data, nomeFile: file.name };

                 console.log("Dati passato alla chiamata; ", payload);


                try {
                    await fetch(webAppUpload, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify(payload)
                    });
                    alert("File PDF caricato correttamente.");
                } catch (error) {
                    alert("Errore salvataggio remoto.");
                } finally {
                    btn.innerText = "Carica pdf";
                    btn.disabled = false;
                    input.value = "";
                    nascondiLoader();
                }
            };
            reader.readAsDataURL(file);
        }

        function confermaEsci() {
            if (confirm("Uscire dalla piattaforma?")) {
                localStorage.removeItem("utenteLoggato");
                window.location.href = "index.html";
            }
        }
        
        function stampaDocumento() {
            // Seleziona dinamicamente il frame corretto
            const frame = getIframeAttivo();
            
            try {
                frame.contentWindow.focus();
                frame.contentWindow.print();
            } catch (e) {
                console.warn("Stampa diretta bloccata, apro in nuova scheda...");
                const urlPDF = frame.src;
                window.open(urlPDF, '_blank');
            }
        }

        function scaricaDocumento() {
            // Seleziona dinamicamente il frame corretto
            const frame = getIframeAttivo();
            let url = frame.src;

            if (!url || url === "" || url.includes("about:blank")) {
                alert("Nessun documento da scaricare.");
                return;
            }
            
            url = url.split('#')[0];
            
            if (url.includes("drive.google.com")) {
                const fileId = url.match(/\/d\/(.+?)\//);
                if (fileId && fileId[1]) {
                    const downloadUrl = "https://drive.google.com/uc?export=download&id=" + fileId[1];
                    window.open(downloadUrl, '_blank');
                } else {
                    window.open(url, '_blank');
                }
            } else {
                const link = document.createElement('a');
                link.href = url;
                link.download = "Documento_Qualita.pdf"; 
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }
    </script>
</body>
</html>
