<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piattaforma Tigros - Home</title>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        body {
            margin: 0;
            background: linear-gradient(135deg, #2b75ee 0%, #a0861d 100%);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

       
        nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 100;
        }

        .nav-left { flex: 1; display: flex; justify-content: flex-start; }
        .user-badge {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255, 255, 255, 0.15);
            padding: 5px 12px; border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .user-initials {
            width: 30px; height: 30px;
            background: #ffcc00; color: #003087;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .user-fullname { color: white; font-size: 0.85rem; font-weight: 600; text-transform: capitalize; }

        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; flex: 2; justify-content: center; text-align: center;}
        li a { text-decoration: none; color: white; font-family: 'Montserrat', sans-serif; font-size: 1.15rem; transition: all 0.4s ease; cursor: pointer; }
        ul:hover li a { filter: blur(2px); opacity: 0.5; transform: scale(0.95); }
        ul li a:hover { filter: blur(0px); opacity: 1; transform: scale(1.15); color: #ffcc00; }
        li a.logout { color: #efba0a; }

        .nav-right { flex: 1; display: flex; justify-content: flex-end; }
        .nav-logo img { height: 38px; width: auto; transition: 0.3s; cursor: pointer; }

    
        .welcome-section {
            display: none; position: absolute; top: 10%; left: 50%;
            transform: translate(-50%, -50%); flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            color: rgb(232, 155, 12); z-index: 10;
        }
        .mostra-benvenuto { display: flex !important; }
        .welcome-title {
            font-family: 'Montserrat', sans-serif; font-size: 3.5rem;
            text-shadow: 0 10px 30px rgba(0,0,0,0.4);
            animation: welcomeSequence 3s ease-in-out forwards; opacity: 0;
        }
        @keyframes welcomeSequence {
            0% { opacity: 0; transform: translateY(30px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-15px); filter: blur(10px); }
        }

        .container-glass {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 40px;
            padding: 40px;
            z-index: 40;
        }


        .glass-box-container {
            display: none; 
            perspective: 1000px;
        }

        .glass-box-container:hover{
            box-shadow: #ffcc00 0px 0px 20px, #ffcc00 0px 0px 20px, #ffcc00 0px 0px 20px;
            border-radius: 20px;
        }

        .feed {
            position: fixed; bottom: 10px; right: 10px;
            background: rgba(0, 0, 0, 0.5); color: white;
            padding: 8px 12px; border-radius: 12px;
            font-size: 0.9rem; cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            transition: background 0.3s ease;
        }

        .feed:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        .book-glass-box, .report-glass-box, .accessi-glass-box, .frutta-glass-box, .manutenzione-glass-box, .haccp-glass-box, .trasporti-glass-box, .freschi-glass-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            text-align: center; width: 400px; height: 250px;
            cursor: pointer; transition: all 0.4s ease;
            animation: apparizioneIniziale 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes apparizioneIniziale {
            0% { opacity: 0; filter: blur(20px); transform: scale(0.85); }
            100% { opacity: 1; filter: blur(0px); transform: scale(1); }
        }

        .book-title, .report-title, .accessi-title, .frutta-title, .manutenzione-title, .haccp-title, .trasporti-title, .freschi-title {
            font-family: 'Montserrat', sans-serif; color: #ecb40c;
            font-size: 20px; margin-bottom: 20px; letter-spacing: 1px;
            transition: transform 0.4s ease;
        }

  
        .book { width: 150px; height: 200px; position: relative; margin: 0 auto; transform-style: preserve-3d; transition: transform 0.5s; }
        .cover {
            width: 100%; height: 96%;
            background: linear-gradient(45deg, #003087 50%, #ecb40c 50%);
            border-radius: 2px 5px 5px 2px;
            position: absolute; z-index: 5;
            transform-origin: left; top: 5%;
            transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
        }
        .cover::after { content: "TIGROS"; color: rgb(6, 41, 198); font-family: Impact; font-size: 30px; }
        .pages {
            width: 90%; height: 90%; background: white;
            position: absolute; top: 5%; left: 5%; z-index: 1;
            display: flex; flex-direction: column; justify-content: center;
            gap: 5px; padding: 5px; transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
        }
        .chart-line { width: 0; height: 5px; background: #2b75ee; border-radius: 3px; transition: width 0.8s ease 0.4s; }
        .chart-line.yellow { background: #ffcc00; }

        .book-glass-box:hover .book-title { transform: scale(1.1); }
        .book-glass-box:hover .cover { transform: rotateY(-160deg) translate(-50%); }
        .book-glass-box:hover .pages { transform: translateX(45%); }
        .book-glass-box:hover .chart-line { width: 100%; }


        .report, .accessi, .frutta, .manutenzione, .haccp, .trasporti, .freschi { width: 150px; height: 200px; position: relative; margin: 0 auto; }
        .report_before, .frutta_before, .accessi_before, .manutenzione_before, .haccp_before, .trasporti_before, .freschi_before {
            width: 150px; height: 150px; background: #efba0a;
            border-radius: 80px; position: absolute; z-index: 5;
            top: 40%; left: 50%; transform: translate(-50%, -50%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            transition: width 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            overflow: hidden;
        }
        .report_before span, .accessi_before span, .frutta_before span, .manutenzione_before span, .haccp_before span, .trasporti_before span, .freschi_before span {
            display: inline-block; font-family: 'Montserrat', sans-serif;
            color: #003087; font-size: 20px; font-weight: bold;
            transition: transform 1.7s ease;
            white-space: normal !important; 
            word-wrap: break-word;
            width: 180px;
        }

    
                    .modal-overlay {
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100vw;
                        height: 100vh;
                        background: rgba(0, 0, 0, 0.5);
                        backdrop-filter: blur(8px);
                        display: none; 
                        justify-content: center;
                        align-items: center;
                        z-index: 2000;
                        opacity: 0;
                        transition: opacity 0.3s ease;
                    }

                   
                    .modal-overlay.show {
                        display: flex;
                        opacity: 1;
                    }

                    .modal-content {
                        background: rgba(255, 255, 255, 0.15);
                        backdrop-filter: blur(25px);
                        border: 1px solid rgba(255, 255, 255, 0.2);
                        border-radius: 20px;
                        width: 450px;
                        max-width: 90%;
                        box-shadow: 0 25px 50px rgba(0,0,0,0.5);
                        position: relative;
                        display: flex;
                        flex-direction: column;
                        gap: 15px;
                        padding: 45px 30px 30px 30px;
                        /* Punto di partenza per l'animazione */
                        transform: scale(0);
                        opacity: 0;
                    }

                   
                    @keyframes expandFromClick {
                        0% {
                            transform: translate(var(--startX), var(--startY)) scale(0);
                            opacity: 0;
                        }
                        100% {
                            transform: translate(0, 0) scale(1);
                            opacity: 1;
                        }
                    }

                    .modal-content.active {
                        animation: expandFromClick 0.5s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
                    }

                   
                    .modal-content input, .modal-content textarea {
                        width: 100%;
                        border: 1px solid rgba(255, 255, 255, 0.2);
                        background: rgba(0, 48, 135, 0.6);
                        color: white;
                        border-radius: 8px;
                        padding: 12px;
                        font-family: 'Montserrat', sans-serif;
                        box-sizing: border-box;
                    }

                    .close-btn {
                        position: absolute;
                        right: 15px;
                        top: 15px;
                        background: none;
                        border: none;
                        color: white;
                        font-size: 24px;
                        cursor: pointer;
                        z-index: 10;
                    }

                    .btn-salva-feed {
                        background: #ffcc00;
                        color: #003087;
                        border: none;
                        padding: 15px;
                        border-radius: 8px;
                        font-family: Impact;
                        font-size: 1.1rem;
                        cursor: pointer;
                    }



        .report-glass-box:hover .report_before, .accessi-glass-box:hover .accessi_before, .frutta-glass-box:hover .frutta_before, .manutenzione-glass-box:hover .manutenzione_before, .haccp-glass-box:hover .haccp_before, .trasporti-glass-box:hover .trasporti_before, .freschi-glass-box:hover .freschi_before { width: 300px; }
        .report-glass-box:hover .report_before span, .accessi-glass-box:hover .accessi_before span, .frutta-glass-box:hover .frutta_before span, .manutenzione-glass-box:hover .manutenzione_before span, .haccp-glass-box:hover .haccp_before span, .freschi-glass-box:hover .freschi_before span { transform: scale(1.5);}

    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <div class="user-badge">
                <div class="user-initials" id="userInitials">??</div>
                <span class="user-fullname" id="userFullname">Utente</span>
            </div>
        </div>
        <ul>
            <li><a href="Home_new.html" style="color: #ffcc00;">HOME</a></li>
            <li><a onclick="confermaEsci()" class="logout">ESCI</a></li>
        </ul>
        <div class="nav-right">
            <div class="nav-logo">
                <img src="LOGO_TIGROS_VERTICALE.jpg" alt="Logo Tigros">
            </div>
        </div>
    </nav>

    <div id="welcomeBox" class="welcome-section">
        <h1 class="welcome-title">BENVENUTO NELLA PIATTAFORMA LOGISTICA TIGROS</h1>
    </div>

    <div class="container-glass">
        
      
         <div class="glass-box-container" id="box-freschi">
            <div class="freschi-glass-box" onclick="window.location.href='inserimento_freschi.html'">
                <h2 class="freschi-title">INEVASI GIORNALIERI</h2>
                <div class="freschi">
                    <div class="freschi_before">
                        <span>Report Inevasi</span>
                    </div>
                </div>
            </div>
        </div>


         <div class="glass-box-container" id="box-pescheria">
            <div class="report-glass-box" onclick="sviluppo()">
                <h2 class="report-title">REPORT GIORNALIERO</h2>
                <div class="report">
                    <div class="report_before">
                        <span>Statistiche Giornaliere</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-box-container" id="box-frutta">
            <div class="frutta-glass-box" onclick="sviluppo()">
                <h2 class="frutta-title">ANDAMENTO REPARTO</h2>
                <div class="frutta">
                    <div class="frutta_before">
                        <span>Statistiche Generali</span>
                    </div>
                </div>
            </div>
        </div>


       
    </div>
            <div class="modal-overlay" id="modalOverlay">
            <div class="modal-content" id="modalContent">
                <button onclick="chiudifeed()" class="close-btn">&times;</button>
                <h3 style="font-family: 'Montserrat', sans-serif; color: #ffcc00; text-align: center; margin: 0; font-size: 18px;">Invia FeedBack o Richieste</h3>
                
                <input type="text" id="feedUser" readonly style="background: rgba(255,255,255,0.05); color: #aaa; cursor: not-allowed;">
                
                <input type="text" id="feedSubject" placeholder="Oggetto">
                
                <textarea id="feedText" placeholder="Scrivi qui il tuo messaggio..."></textarea>
                
                <button class="btn-salva-feed" onclick="salvaFeedback()">INVIA FEEDBACK</button>
            </div>
        </div>

    <script>

        const autorizzazioni = {
            "Admin": ["book", "pescheria", "accessi", "frutta"],
            "Qualita.Pesce": ["pescheria", "book"],
            "User.Ortofrutta": ["frutta", "book"],
            "Test": ["pescheria"],
            "giacomo bardelli": ["book","accessi", "pescheria", "frutta", "manutenzione", "haccp", "trasporti", "freschi"],
        };

        window.onload = function() {
         
            const comingFrom = document.referrer;
            const welcomeBox = document.getElementById('welcomeBox');
            if (comingFrom.includes("index")) {
                welcomeBox.classList.add('mostra-benvenuto');
                setTimeout(() => { welcomeBox.classList.remove('mostra-benvenuto'); }, 3000);
            }

         
            const nomeUtente = localStorage.getItem("utenteLoggato") || "Ospite";
            document.getElementById('userFullname').innerText = nomeUtente;
            
            const parti = nomeUtente.split(/[._ ]/); 
            let iniziali = (parti.length > 1) ? parti[0][0] + parti[1][0] : parti[0][0] + (parti[0][1] || "");
            document.getElementById('userInitials').innerText = iniziali.toUpperCase();

            const repartiConsentiti = autorizzazioni[nomeUtente] || ["book"]; // 
            const tuttiIBox = ["book", "pescheria", "accessi", "frutta","manutenzione", "haccp", "trasporti", "freschi"];

            tuttiIBox.forEach(reparto => {
                const boxWrapper = document.getElementById('box-' + reparto);
                if (boxWrapper) {
                    if (repartiConsentiti.includes(reparto)) {
                        boxWrapper.style.display = 'block'; // Mostra
                    } else {
                        boxWrapper.remove(); 
                    }
                }
            });
        };

        function vaiReport(){ window.location.href = "ControlloPescheria.html"; }
        function vaiBook(){ window.location.href = "book.html"; }
        function sviluppo(){ alert("Sezione non disponibile.\nIn fase di sviluppo."); }

        function confermaEsci() {
            if (confirm("Sei sicuro di voler uscire dalla Piattaforma Tigros?")) {
                localStorage.removeItem("utenteLoggato");
                window.location.href = "index.html";
            }
        }

        
            function aprifeed(e) {
                    const overlay = document.getElementById('modalOverlay');
                    const content = document.getElementById('modalContent');
                    const feedUserField = document.getElementById('feedUser');
                    
             
                    const nomeLoggato = document.getElementById('userFullname').innerText;
                    feedUserField.value = nomeLoggato;

                    const rect = e.currentTarget.getBoundingClientRect();
                    const startX = (rect.left + rect.width / 2) - (window.innerWidth / 2);
                    const startY = (rect.top + rect.height / 2) - (window.innerHeight / 2);

                    content.style.setProperty('--startX', `${startX}px`);
                    content.style.setProperty('--startY', `${startY}px`);

                  
                    overlay.style.display = 'flex';
                    
                   
                    setTimeout(() => {
                        overlay.classList.add('show');
                        content.classList.add('active');
                    }, 10);
                }

                function chiudifeed() {
                    const overlay = document.getElementById('modalOverlay');
                    const content = document.getElementById('modalContent');
                    
                    
                    content.classList.remove('active');
                    overlay.classList.remove('show');
                    
                
                    setTimeout(() => {
                        overlay.style.display = 'none';
                       
                        content.style.transform = "scale(0)";
                    }, 400); 
                }

                async function salvaFeedback() {
                            const btn = event.target;
                            
                       
                            const payload = {
                                user: document.getElementById('feedUser').value,
                                subject: document.getElementById('feedSubject').value,
                                text: document.getElementById('feedText').value,
                                azione: 'inviaFeedback'
                            };

               
                            if (!payload.subject || !payload.text) {
                                alert("Compila tutti i campi!");
                                return;
                            }

                            btn.innerText = "INVIO IN CORSO...";
                            btn.disabled = true;

                            try {
                               
                                await fetch("https://script.google.com/macros/s/AKfycbxjgzkWhP284tzaZjKS2_siazqUYIJcNO8hu6SsktyTWbsxqORHkpuj7OUia2nRDaFWjQ/exec", {
                                    method: 'POST',
                                    mode: 'no-cors', 
                                    body: JSON.stringify(payload)
                                });
                                
                                alert("✅ Feedback inviato con successo!");
                                chiudifeed();
                            } catch (e) {
                                alert("Errore nell'invio del messaggio.");
                            } finally {
                                btn.innerText = "INVIA FEEDBACK";
                                btn.disabled = false;
                            }
                        }

    </script>
</body>
</html>
