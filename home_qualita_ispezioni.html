<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piattaforma Tigros - Home Qualità</title>
    <link rel="icon" type="image/png" href="images.png">
    <link rel="apple-touch-icon" href="images.png">
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        body {
            margin: 0;
            background: linear-gradient(135deg, #2b75ee 0%, #a0861d 100%);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

       
        nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 100;
        }

        .nav-left { flex: 1; display: flex; justify-content: flex-start; }
        .user-badge {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255, 255, 255, 0.15);
            padding: 5px 12px; border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }
        .user-initials {
            width: 30px; height: 30px;
            background: #ffcc00; color: #003087;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .user-fullname { color: white; font-size: 0.85rem; text-transform: capitalize; }

        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; flex: 2; justify-content: center; text-align: center;}
        li a { text-decoration: none; color: white; font-family: 'Montserrat', sans-serif; font-size: 1.15rem; transition: all 0.4s ease; cursor: pointer; }
        ul:hover li a { filter: blur(2px); opacity: 0.5; transform: scale(0.95); }
        ul li a:hover { filter: blur(0px); opacity: 1; transform: scale(1.15); color: #ffcc00; }
        li a.logout { color: #efba0a; }

        .nav-right { 
            flex: 1; 
            display: flex; 
            justify-content: flex-end; 
            align-items: center;
            gap: 15px; 
        }

        .nav-logo {
                display: flex;
                align-items: center; 
            }

            .nav-logo img { 
                height: 38px; 
                display: block;
                border-radius: 5px; 
            }

       

        .btn-prev { 
                background: #ffcc00; 
                color: #003087; 
                border: none; 
                padding: 8px 18px; 
                border-radius: 5px; 
                cursor: pointer; 
                margin: 0 20px 0 0;
                font-weight: 550;
                font-family: 'Montserrat', sans-serif; 
                display: inline-flex;
                align-items: center;
                justify-content: center;
                height: 38px; 
                box-sizing: border-box; 
            }

    
        .welcome-section {
            display: none; position: absolute; top: 85%; left: 50%;
            transform: translate(-50%, -50%); flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            color: rgb(232, 155, 12); z-index: 10;
        }
        .mostra-benvenuto { display: flex !important; }
        .welcome-title {
            font-family: 'Montserrat', sans-serif; font-size: 3.5rem;
            text-shadow: 0 10px 30px rgba(0,0,0,0.4);
            animation: welcomeSequence 3s ease-in-out forwards; opacity: 0;
        }
        @keyframes welcomeSequence {
            0% { opacity: 0; transform: translateY(30px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-15px); filter: blur(10px); }
        }

        .container-glass {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 40px;
            padding: 40px;
            z-index: 50;
            overflow-y: auto;
        }

        container-glass::-webkit-scrollbar {
                width: 10px;               
                height: 10px;             
            }

           
            .container-glass::-webkit-scrollbar-track {
                background: rgba(255, 255, 255, 0.05);
                border-radius: 10px;
            }


            .container-glass::-webkit-scrollbar-thumb {
                background: #ffcc00;      
                border-radius: 10px;       
                border: 2px solid rgba(0, 48, 135, 0.5); 
            }


            .container-glass::-webkit-scrollbar-thumb:hover {
                background: #ffdb4d;     
                cursor: pointer;
            }

            .container-glass {
                    scrollbar-width: thin;    
                    scrollbar-color: #ffcc00 rgba(255, 255, 255, 0.05); 
                }
            

            .glass-box-container {
                display: none; 
                perspective: 1000px;
            }

            .glass-box-container:hover{
                box-shadow: #ffcc00 0px 0px 20px, #ffcc00 0px 0px 20px, #ffcc00 0px 0px 20px;
                border-radius: 20px;
            }


        .glass-box-container {
            display: none; 
            perspective: 1000px;
        }

        .glass-box-container:hover{
            box-shadow: #ffcc00 0px 0px 20px, #ffcc00 0px 0px 20px, #ffcc00 0px 0px 20px;
            border-radius: 20px;
        }

        .book-glass-box, .report-glass-box, .accessi-glass-box, .frutta-glass-box, .manutenzione-glass-box, .haccp-glass-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            text-align: center; width: 400px; height: 250px;
            cursor: pointer; transition: all 0.4s ease;
            animation: apparizioneIniziale 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes apparizioneIniziale {
            0% { opacity: 0; filter: blur(20px); transform: scale(0.85); }
            100% { opacity: 1; filter: blur(0px); transform: scale(1); }
        }

        .book-title, .report-title, .accessi-title, .frutta-title, .manutenzione-title, .haccp-title {
            font-family: 'Montserrat', sans-serif; color: #ecb40c;
            font-size: 25px; margin-bottom: 20px; letter-spacing: 1px;
            transition: transform 0.4s ease;
        }

  
        .book { width: 150px; height: 200px; position: relative; margin: 0 auto; transform-style: preserve-3d; transition: transform 0.5s; }
        .cover {
            width: 100%; height: 96%;
            background: linear-gradient(45deg, #003087 50%, #ecb40c 50%);
            border-radius: 2px 5px 5px 2px;
            position: absolute; z-index: 5;
            transform-origin: left; top: 5%;
            transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
        }
        .cover::after { content: "TIGROS"; color: rgb(6, 41, 198); font-family: Impact; font-size: 30px; }
        .pages {
            width: 90%; height: 90%; background: white;
            position: absolute; top: 5%; left: 5%; z-index: 1;
            display: flex; flex-direction: column; justify-content: center;
            gap: 5px; padding: 5px; transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
        }
        .chart-line { width: 0; height: 5px; background: #2b75ee; border-radius: 3px; transition: width 0.8s ease 0.4s; }
        .chart-line.yellow { background: #ffcc00; }

        .book-glass-box:hover .book-title { transform: scale(1.1); }
        .book-glass-box:hover .cover { transform: rotateY(-160deg) translate(-50%); }
        .book-glass-box:hover .pages { transform: translateX(45%); }
        .book-glass-box:hover .chart-line { width: 100%; }

        
        .report, .accessi, .frutta, .manutenzione, .haccp { width: 150px; height: 200px; position: relative; margin: 0 auto; }
        .report_before, .frutta_before, .accessi_before, .manutenzione_before, .haccp_before {
            width: 150px; height: 150px; background: #efba0a;
            border-radius: 80px; position: absolute; z-index: 5;
            top: 40%; left: 50%; transform: translate(-50%, -50%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            transition: width 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            overflow: hidden;
        }
        .report_before span, .accessi_before span, .frutta_before span, .manutenzione_before span, .haccp_before span {
            display: inline-block; font-family: 'Montserrat', sans-serif;
            color: #003087; font-size: 20px; font-weight: bold;
            transition: transform 1.7s ease;
            white-space: normal !important; 
            word-wrap: break-word;
            width: 180px;
        }

        .report-glass-box:hover .report_before, .accessi-glass-box:hover .accessi_before, .frutta-glass-box:hover .frutta_before, .manutenzione-glass-box:hover .manutenzione_before, .haccp-glass-box:hover .haccp_before { width: 300px; }
        .report-glass-box:hover .report_before span, .accessi-glass-box:hover .accessi_before span, .frutta-glass-box:hover .frutta_before span, .manutenzione-glass-box:hover .manutenzione_before span, .haccp-glass-box:hover .haccp_before span { transform: scale(1.5); }
        

    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <div class="user-badge" onclick="location.href='info_utente.html'">
                <div class="user-initials" id="userInitials">??</div>
                <span class="user-fullname" id="userFullname">Utente</span>
            </div>
        </div>
        <ul>
            <li><a href="Home_new.html" style="color: #ffcc00;">HOME</a></li>

            <li><a onclick="confermaEsci()" class="logout">ESCI</a></li>
        </ul>
        <div class="nav-right">
            <div class="nav-logo">
                <button class="btn-prev" onclick="location.href='home_qualita.html'">INDIETRO</button>
                <img src="LOGO_TIGROS_VERTICALE.jpg" alt="Logo Tigros">
            </div>
        </div>
    </nav>

    <div id="welcomeBox" class="welcome-section">
        <h1 class="welcome-title">BENVENUTO NELLA PIATTAFORMA LOGISTICA TIGROS</h1>
    </div>

    <div class="container-glass">
      

        <div class="glass-box-container" id="box-richiami">
            <div class="accessi-glass-box" onclick="sviluppo()">
                <h2 class="accessi-title">ISPEZIONI</h2>
                <div class="accessi">
                    <div class="accessi_before">
                        <span>Ispezioni Piattaforma</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-box-container" id="box-report">
            <div class="haccp-glass-box" onclick="sviluppo()">
                <h2 class="haccp-title">ISPEZIONI</h2>
                <div class="haccp">
                    <div class="haccp_before">
                        <span>Ispezioni Punti Vendita</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-box-container" id="box-check">
            <div class="haccp-glass-box" onclick="sviluppo()">
                <h2 class="haccp-title">AZIENDA PULIZIE</h2>
                <div class="haccp">
                    <div class="haccp_before">
                        <span>Analisi e Report</span>
                    </div>
                </div>
            </div>
        </div>


    </div>

    <script>

        const autorizzazioni = {

            "GIACOMO BARDELLI": ["richiami", "report", "check", "laboratori","fornitori"],
            "ERMANNO LAMPERTI": ["richiami", "report", "check", "laboratori","fornitori"],
            "ELABORAZIONI CEDI": ["richiami", "report", "check", "laboratori","fornitori"],

        };

        window.onload = function() {
         
            const comingFrom = document.referrer;
            const welcomeBox = document.getElementById('welcomeBox');
            if (comingFrom.includes("index")) {
                welcomeBox.classList.add('mostra-benvenuto');
                setTimeout(() => { welcomeBox.classList.remove('mostra-benvenuto'); }, 3000);
            }

         
            const nomeUtente = localStorage.getItem("utenteLoggato") || "Ospite";
            document.getElementById('userFullname').innerText = nomeUtente;
            
            const parti = nomeUtente.split(/[._ ]/); 
            let iniziali = (parti.length > 1) ? parti[0][0] + parti[1][0] : parti[0][0] + (parti[0][1] || "");
            document.getElementById('userInitials').innerText = iniziali.toUpperCase();

               let utenteFormattato = nomeUtente.toUpperCase();

                    console.log("Utente loggato formattato:", utenteFormattato);

            const repartiConsentiti = autorizzazioni[utenteFormattato] || ["book"]; // 
            const tuttiIBox = [ "richiami", "report", "check", "laboratori","fornitori" ];

            tuttiIBox.forEach(reparto => {
                const boxWrapper = document.getElementById('box-' + reparto);
                if (boxWrapper) {
                    if (repartiConsentiti.includes(reparto)) {
                        boxWrapper.style.display = 'block'; 
                    } else {
                        boxWrapper.remove(); 
                    }
                }
            });
        };

        function vaiReport(){ window.location.href = "ControlloPescheria.html"; }
        function vaiBook(){ window.location.href = "book.html"; }
        function sviluppo(){ alert("Sezione non disponibile.\nIn fase di sviluppo."); }

        function confermaEsci() {
            if (confirm("Sei sicuro di voler uscire dalla Piattaforma Tigros?")) {
                localStorage.removeItem("utenteLoggato");
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
