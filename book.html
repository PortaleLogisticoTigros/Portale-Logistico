<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piattaforma Tigros - Procedure</title>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        body {
            margin: 0;
            background: linear-gradient(135deg, #2b75ee 0%, #a0861d 100%);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 10;
        }

        .nav-left { flex: 1; display: flex; justify-content: flex-start; }
        .user-badge {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255, 255, 255, 0.15);
            padding: 5px 12px; border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        .user-initials {
            width: 30px; height: 30px; background: #ffcc00; color: #003087;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-weight: bold; font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .user-fullname { color: white; font-size: 0.85rem; text-transform: capitalize; white-space: nowrap; }

        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; flex: 2; justify-content: center; text-align: center;}
        li a { text-decoration: none; color: white; font-family: 'Montserrat', sans-serif; font-size: 1.15rem; transition: all 0.4s ease; cursor: pointer; white-space: nowrap; }

        .nav-right { flex: 1; display: flex; justify-content: flex-end; align-items: center; }
        .nav-right .caricoPDF {
            background: #ffcc00; color: #003087; border: none;
            padding: 10px 30px; border-radius: 25px; font-weight: bold;
            font-size: 15px;
            font-family: 'Montserrat', sans-serif; cursor: pointer; transition: all 0.3s ease; margin-right: 20px;
        }

        .nav-right .stampaPDF {
            background: #ffcc00; color: #003087; border: none;
            padding: 10px 30px; border-radius: 25px; font-weight: bold;
            font-size: 15px;
           font-family: 'Montserrat', sans-serif; cursor: pointer; transition: all 0.3s ease; margin-right: 20px;
        }

        .nav-logo img { height: 40px; width: auto; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2)); }
        .caricoPDF:hover { background: #003087; color: #ff9900; transform: scale(1.05); }
        .stampaPDF:hover { background: #003087; color: #ff9900; transform: scale(1.05); }

        ul:hover li a { filter: blur(2px); opacity: 0.6; }
        ul li a:hover { filter: blur(0px); opacity: 1; transform: scale(1.1); color: #ffcc00; }
        
        .iframe-wrapper {
            flex-grow: 1;
            position: relative;
            width: 100%;
            height: 100%;
            background: #333;
            border: none;
        }

        iframe { width: 100%; height: 100%; border: none; display: block; }

        #loaderContainer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
            color: white;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid #ffcc00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ------------------------------------------------------------------ */
        /* MEDIA QUERIES SOLO PER MOBILE (Fino a 768px)                       */
        /* ------------------------------------------------------------------ */
        @media (max-width: 768px) {
            /* Manteniamo il blocco totale del body per dare il 100% all'iframe */
            body { 
                height: 100vh; 
                overflow: hidden; 
            }

            /* Navigazione orizzontale scorrevole, tutto su una riga */
            nav {
                flex-direction: row;
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                padding: 10px;
                gap: 15px;
                justify-content: flex-start;
                scrollbar-width: none; /* Nasconde scrollbar su Firefox */
            }
            nav::-webkit-scrollbar { display: none; } /* Nasconde scrollbar su Chrome/Safari */

            /* Impediamo il collasso degli elementi */
            .nav-left, nav ul, .nav-right {
                flex: 0 0 auto;
                width: auto;
                justify-content: flex-start;
                margin: 0;
                padding: 0;
            }

            .user-fullname { display: none; }
            .user-badge { padding: 5px; background: transparent; border: none; }
            
            nav ul {
                gap: 15px;
                overflow: visible;
            }
            
            nav ul li a { font-size: 0.9rem; }

            .nav-right {
                flex-direction: row;
                flex-wrap: nowrap;
                gap: 10px;
                align-items: center;
            }

            .nav-right .caricoPDF, .nav-right .stampaPDF {
                margin: 0;
                padding: 8px 15px;
                font-size: 0.8rem;
            }

            .nav-logo {
                margin-left: 5px;
            }
            .nav-logo img { height: 30px; }

            /* Il wrapper dell'iframe prende tutto lo spazio rimanente */
            .iframe-wrapper {
                flex: 1;
                height: auto;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <div class="user-badge" onclick="location.href='info_utente.html'">
                <div class="user-initials" id="userInitials">??</div>
                <span class="user-fullname" id="userFullname">Utente</span>
            </div>
        </div>

        <ul>
            <li><a href="Home_new.html">HOME</a></li>
            <li><a href="Viaggi.html">DASHBOARD VIAGGI</a></li>
            <li><a href="Ordini.html">DASHBOARD ORDINI</a></li>
            <li><a href="Ricevimenti.html">DASHBOARD RICEVIMENTI</a></li> 
            <li><a onclick="confermaEsci()" style="color:#efba0a">ESCI</a></li>
        </ul>

        <div class="nav-right">
                <button class="caricoPDF" id="btnUpload" onclick="document.getElementById('hiddenFileInput').click()">Carica pdf</button>
                <input type="file" id="hiddenFileInput" accept="application/pdf" style="display: none;" onchange="gestisciUpload(this)">
                
                <button class="stampaPDF" id="btnPrint" onclick="scaricaDocumento()">Scarica pdf</button>
                
                <div class="nav-logo">
                    <img src="LOGO_TIGROS_VERTICALE.jpg" alt="Logo Tigros">
                </div>
            </div>
    </nav>

    <div class="iframe-wrapper">
        <div id="loaderContainer">
            <div class="spinner"></div>
            <p id="loaderText" style="color:#ffcc00; font-family: 'Montserrat', sans-serif;">Caricamento PDF in corso...</p>
        </div>
        
        <iframe id="pdfFrame" src="" style="visibility: hidden;" onload="nascondiLoader()"></iframe>
    </div>

    <script>
        const webAppUrl = "https://script.google.com/macros/s/AKfycbxjgzkWhP284tzaZjKS2_siazqUYIJcNO8hu6SsktyTWbsxqORHkpuj7OUia2nRDaFWjQ/exec"; 
        const utentiAutorizzati = ["GIACOMO BARDELLI"];
    
        function nascondiLoader() {
            document.getElementById('loaderContainer').style.display = 'none';
            document.getElementById('pdfFrame').style.visibility = 'visible';
        }

        
        function mostraLoader(testo) {
            document.getElementById('loaderText').innerText = testo || "Caricamento PDF in corso...";
            document.getElementById('loaderContainer').style.display = 'flex';
            document.getElementById('pdfFrame').style.visibility = 'hidden';
        }

        window.addEventListener('load', async function() {
            mostraLoader("Caricamento Book Logistico in corso...");
            
            try {
                const response = await fetch(webAppUrl + "?t=" + new Date().getTime());
                const urlDrive = await response.text();
                
                if (urlDrive && urlDrive.startsWith("http")) {
                    let finalUrl = urlDrive.replace("/view", "/preview");
                    finalUrl += "#pagemode=thumbs&view=FitH&toolbar=1";
                    document.getElementById('pdfFrame').src = finalUrl;
                } else {
                  
                    document.getElementById('pdfFrame').src = "Book Logistico.pdf#view=FitH";
                }
            } catch (err) {
                console.error("Errore Drive:", err);
                document.getElementById('pdfFrame').src = "Book Logistico.pdf#view=FitH";
            }

          
                    const nomeUtente = localStorage.getItem("utenteLoggato") || "Ospite";
                    document.getElementById('userFullname').innerText = nomeUtente;
                    
                    nomeFormattato = nomeUtente.toUpperCase();

                        console.log("Utente loggato fomattato:", nomeFormattato);
                 
                    const btnUpload = document.getElementById('btnUpload');
                    if (utentiAutorizzati.includes(nomeFormattato)) {
                        btnUpload.style.display = "inline-block"; 
                    } else {
                        btnUpload.style.display = "none"; 
                    }

            
     
            document.getElementById('userFullname').innerText = nomeUtente;
            const parti = nomeUtente.split(/[._ ]/); 
            let iniziali = (parti.length > 1) ? (parti[0][0] + parti[1][0]) : (parti[0][0] + (parti[0][1] || ""));
            document.getElementById('userInitials').innerText = iniziali.toUpperCase();
        });



        async function gestisciUpload(input) {

            const nomeUtenteLoggato = localStorage.getItem("utenteLoggato") || "Ospite";
            nomeFormattatoControllo = nomeUtenteLoggato.toUpperCase();

                    if (!utentiAutorizzati.includes(nomeFormattatoControllo)) {
                        alert("Accesso negato " + nomeUtenteLoggato + " ma non hai i permessi per caricare file.");
                        return;
                    }

            const file = input.files[0];
            if (!file) return;

            mostraLoader("Elaborazione file caricato...");

            const blobUrl = URL.createObjectURL(file);
            document.getElementById('pdfFrame').src = blobUrl + "#pagemode=thumbs";

            const btn = document.getElementById('btnUpload');
            btn.innerText = "SALVATAGGIO...";
            btn.disabled = true;

            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64Data = e.target.result.split(',')[1];
                const payload = { azione: "uploadPDF", blob: base64Data, nomeFile: file.name };

                try {
                    await fetch(webAppUrl, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify(payload)
                    });
                    alert("File PDF caricato correttamente.");
                } catch (error) {
                    alert("Errore salvataggio remoto.");
                } finally {
                    btn.innerText = "Carica pdf";
                    btn.disabled = false;
                    input.value = "";
                }
            };
            reader.readAsDataURL(file);
        }

        function confermaEsci() {
            if (confirm("Uscire dalla piattaforma?")) {
                localStorage.removeItem("utenteLoggato");
                window.location.href = "index.html";
            }
        }
        
        function stampaDocumento() {
                const frame = document.getElementById('pdfFrame');
                
                try {
                   
                    frame.contentWindow.focus();
                    frame.contentWindow.print();

                } catch (e) {
                  
                    console.warn("Stampa diretta bloccata, apro in nuova scheda...");
                    const urlPDF = frame.src;
                    window.open(urlPDF, '_blank');
                }
            }

            function scaricaDocumento() {
                    const frame = document.getElementById('pdfFrame');
                    let url = frame.src;

                    if (!url || url === "" || url.includes("about:blank")) {
                        alert("Nessun documento da scaricare.");
                        return;
                    }

                    
                    url = url.split('#')[0];

                    
                    if (url.includes("drive.google.com")) {
                        
                        const fileId = url.match(/\/d\/(.+?)\//);
                        if (fileId && fileId[1]) {
                            const downloadUrl = "https://drive.google.com/uc?export=download&id=" + fileId[1];
                            window.open(downloadUrl, '_blank');
                        } else {
                            
                            window.open(url, '_blank');
                        }
                    } 
         
                    else {
                        const link = document.createElement('a');
                        link.href = url;
                        link.download = "Documento_Logistico.pdf"; 
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    }
                }

    </script>
</body>
</html>
